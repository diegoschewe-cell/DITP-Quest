<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DITP | GALAXY COMMAND v22.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #31ada1; --neon-blue: #00f2ff; --bg-dark: #010409; }
        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(10, 25, 47, 0.8) 0%, rgba(1, 4, 9, 1) 100%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* HUD Header */
        .hud-panel {
            background: rgba(1, 4, 9, 0.85);
            border: 1px solid rgba(49, 173, 161, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* Mission Node Grid */
        .node-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: pointer;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Neon Effects */
        .node-card.completed {
            border-color: var(--neon-green);
            box-shadow: inset 0 0 15px rgba(49, 173, 161, 0.2), 0 0 20px rgba(49, 173, 161, 0.4);
        }
        .node-card.active {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        .node-card.locked {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .node-card:hover:not(.locked) {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Progress Bar */
        .progress-container {
            width: 150px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        #p-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            transition: width 1s ease-in-out;
        }

        /* Numpad Styling */
        .key-btn {
            width: 60px;
            height: 60px;
            border: 1px solid rgba(49, 173, 161, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--neon-green);
            transition: 0.2s;
            background: rgba(49, 173, 161, 0.05);
        }
        .key-btn:active { background: var(--neon-green); color: #000; transform: scale(0.9); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #31ada1; border-radius: 3px; }

        .section-divider {
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5em;
            font-size: 10px;
            margin: 40px 0 20px 0;
            text-align: center;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto">
    <header class="hud-panel p-6 mb-12 flex flex-col md:flex-row justify-between items-center gap-6">
        <div class="flex items-center gap-5">
            <img src="Logo-ditp.png" class="w-16 h-16 object-contain" onerror="this.src='https://via.placeholder.com/64?text=DITP'">
            <div>
                <h1 class="orbitron text-2xl font-black tracking-widest text-white">GALAXY COMMAND</h1>
                <div class="flex items-center gap-3 mt-1">
                    <span class="text-[10px] orbitron font-bold text-neon-green uppercase tracking-tighter">Commander: HIẾU NGUYỄN</span>
                    <div class="progress-container"><div id="p-bar" style="width: 0%"></div></div>
                    <span class="text-[10px] orbitron font-bold text-white bg-blue-900/50 px-2 py-0.5 rounded">LVL 1</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-end">
            <div class="text-right">
                <p class="text-[10px] orbitron opacity-50 uppercase tracking-widest">System Integrity</p>
                <p id="integrity-text" class="text-3xl font-black orbitron text-white">0%</p>
            </div>
            <button onclick="showAuth()" id="auth-btn" class="mt-2 text-[9px] orbitron border border-[#31ada1]/40 px-6 py-2 rounded-md text-[#31ada1] hover:bg-[#31ada1]/10 uppercase transition">
                [ COMMANDER VERIFIED ]
            </button>
        </div>
    </header>

    <div id="mission-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
        </div>
</div>

<div id="auth-overlay" style="display:none; position:fixed; inset:0; background:rgba(1, 4, 9, 0.98); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(20px);">
    <div class="text-center w-64">
        <div class="flex gap-4 justify-center mb-10" id="auth-dots">
            <div class="w-3 h-3 rounded-full border border-[#31ada1]"></div><div class="w-3 h-3 rounded-full border border-[#31ada1]"></div><div class="w-3 h-3 rounded-full border border-[#31ada1]"></div><div class="w-3 h-3 rounded-full border border-[#31ada1]"></div>
        </div>
        <div class="grid grid-cols-3 gap-4 mb-8">
            <button onclick="pressNum('1')" class="key-btn orbitron">1</button><button onclick="pressNum('2')" class="key-btn orbitron">2</button><button onclick="pressNum('3')" class="key-btn orbitron">3</button>
            <button onclick="pressNum('4')" class="key-btn orbitron">4</button><button onclick="pressNum('5')" class="key-btn orbitron">5</button><button onclick="pressNum('6')" class="key-btn orbitron">6</button>
            <button onclick="pressNum('7')" class="key-btn orbitron">7</button><button onclick="pressNum('8')" class="key-btn orbitron">8</button><button onclick="pressNum('9')" class="key-btn orbitron">9</button>
            <button onclick="clearPin()" class="key-btn text-[10px] orbitron">CLR</button><button onclick="pressNum('0')" class="key-btn orbitron">0</button><button onclick="closeAuth()" class="key-btn text-[10px] text-red-500 orbitron">ESC</button>
        </div>
    </div>
</div>

<script>
    // --- LINK GOOGLE APPS SCRIPT CỦA ANH HIẾU ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx05iotVqNi1yvApmFyAyGGxgoeVH2tvcD--oYFw1xzKA8KBC-zzFVWic3yNkiYLovmNQ/exec';
    
    const titles = ["Hợp đồng cổ đông", "Góp vốn IP", "Tuyển Core 5", "Pháp nhân DITP", "MOU HTC", "Bản quyền 9.0", "Căn cứ R&D", "Hồ sơ Liên minh", "Ngân sách 12T", "Demo v1.0", "Pre-FS v1.6", "Tờ trình đầu tư", "Điều khoản ưu tiên", "Báo cáo C06", "Sandbox Scoring", "Dữ liệu sạch", "Ủng hộ Bộ", "Bảo mật C4", "Dashboard", "Phê duyệt", "Rà soát 15 Bộ", "Hợp nhất HC", "Hạ tầng DC", "VNeID thử", "API Dân cư", "An ninh mạng", "App Cán bộ", "Chạy điểm", "AI Tuning", "Nghiệm thu GĐ1", "Startup ngành", "Góp vốn IP", "BCC RAR", "Thuật toán TM", "Phí API", "MOU Ngân hàng", "Voucher An sinh", "VNeID Truyền thông", "Gọi vốn Startup", "1M Giao dịch", "Dòng tiền API", "Kiểm toán quốc tế", "Nâng cấp AI", "Phủ 15 nhóm", "Hội thảo Data", "Thoái vốn", "Lộ trình niêm yết", "Báo cáo ESG", "Nộp hồ sơ", "IPO"];
    
    let missions = Array.from({length: 50}, (_, i) => ({ 
        id: i + 1, title: titles[i], status: false, note: "Waiting...", doc: "#" 
    }));
    let isAdmin = false;
    let pin = "";

    async function init() {
        await fetchFromSheets();
        setInterval(fetchFromSheets, 5000);
        
        window.addEventListener('keydown', (e) => {
            if (document.getElementById('auth-overlay').style.display === 'flex') {
                if (e.key >= '0' && e.key <= '9') pressNum(e.key);
                if (e.key === 'Backspace') clearPin();
                if (e.key === 'Escape') closeAuth();
            }
        });
    }

    async function fetchFromSheets() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            if (data && data.length > 0) {
                data.forEach((item, i) => {
                    const m = missions[i];
                    if (m) {
                        m.status = (item.status === true || item.status === "TRUE");
                        m.note = item.note || "Waiting...";
                        m.doc = item.doc || "#";
                    }
                });
                render();
            }
        } catch (e) { console.error("Sync Error"); }
    }

    async function toggleTask(id) {
        if (!isAdmin) return;
        const m = missions.find(x => x.id === id);
        if (id > 1 && !missions[id-2].status && !m.status) return;
        
        const nextStatus = !m.status;
        m.status = nextStatus;
        render();

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ id: id, status: nextStatus })
            });
        } catch (e) { console.error("Save Error"); }
    }

    function render() {
        const grid = document.getElementById('mission-grid');
        grid.innerHTML = '';
        
        let done = missions.filter(m => m.status).length;
        let percent = Math.round((done/50)*100);
        document.getElementById('p-bar').style.width = percent + '%';
        document.getElementById('integrity-text').innerText = percent + '%';

        missions.forEach((m, i) => {
            if (i === 0) grid.innerHTML += `<div class="col-span-full section-divider font-bold">--- Station 01: Genesis ---</div>`;
            if (i === 10) grid.innerHTML += `<div class="col-span-full section-divider font-bold">--- Station 02: Tactics ---</div>`;

            const avail = i === 0 || missions[i-1].status;
            const state = m.status ? 'completed' : (avail ? 'active' : 'locked');
            
            const card = document.createElement('div');
            card.className = `node-card ${state}`;
            card.onclick = () => toggleTask(m.id);
            card.innerHTML = `
                <div>
                    <p class="text-[8px] orbitron opacity-50 mb-1">NODE ${String(m.id).padStart(2, '0')}</p>
                    <h3 class="text-[12px] font-bold tracking-tight ${m.status ? 'text-white' : 'text-slate-400'}">${m.title}</h3>
                </div>
                <div>
                    <p class="text-[9px] italic opacity-40 mt-3 truncate">${m.note}</p>
                </div>
                ${m.status ? '<div class="absolute top-2 right-2 w-1.5 h-1.5 rounded-full bg-emerald-400 shadow-[0_0_10px_#34d399]"></div>' : ''}
            `;
            grid.appendChild(card);
        });
    }

    function showAuth() { document.getElementById('auth-overlay').style.display = 'flex'; pin = ""; updateDots(); }
    function closeAuth() { document.getElementById('auth-overlay').style.display = 'none'; }
    function clearPin() { pin = ""; updateDots(); }
    function pressNum(n) {
        if (pin.length < 4) {
            pin += n;
            updateDots();
            if (pin === "1909") {
                isAdmin = true;
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('auth-btn').innerText = "[ COMMANDER VERIFIED ]";
                document.getElementById('auth-btn').style.borderColor = "#31ada1";
                render();
            } else if (pin.length === 4) setTimeout(clearPin, 300);
        }
    }
    function updateDots() {
        const ds = document.getElementById('auth-dots').children;
        for(let i=0; i<4; i++) ds[i].style.background = pin.length > i ? '#31ada1' : 'transparent';
    }
    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DITP | GALAXY COMMAND v9.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon-blue: #00f2ff; --neon-purple: #bc13fe; --neon-green: #0cf3a8; --bg-dark: #020617; }
        body { margin: 0; background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Nebula Background */
        .nebula {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 70%);
            overflow: hidden;
        }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* Web3 Glassmorphism Node */
        .node-web3 {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .node-web3.active { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .node-web3.completed { border-color: var(--neon-green); background: rgba(12, 243, 168, 0.05); box-shadow: 0 0 30px rgba(12, 243, 168, 0.2); }
        .node-web3.locked { opacity: 0.2; filter: grayscale(1); cursor: not-allowed; }

        /* Neural Paths (SVG Lines) */
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .path-line { fill: none; stroke: rgba(0, 242, 255, 0.1); stroke-width: 1.5; transition: 1s; }
        .path-line.active { stroke: var(--neon-blue); stroke-dasharray: 5; animation: flow 20s linear infinite; opacity: 0.6; }

        @keyframes flow { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }

        /* Auth UI */
        #auth-overlay {
            position: fixed; inset: 0; z-index: 1000; background: rgba(2, 6, 23, 0.98);
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px);
        }
        .numpad-dot { width: 12px; height: 12px; border: 1px solid var(--neon-blue); border-radius: 50%; transition: 0.3s; }
        .numpad-dot.filled { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
    </style>
</head>
<body>

<div class="nebula" id="nebula-bg"></div>
<svg id="svg-paths"></svg>

<div class="relative z-10 p-6 max-w-7xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-16 p-6 node-web3">
        <div class="flex items-center gap-6">
            <div class="p-3 bg-white rounded-xl">
                <img src="logo-ditp.png" alt="DITP" class="w-20 h-auto" onerror="this.src='https://via.placeholder.com/80?text=DITP'">
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase italic text-white">Galaxy Command Hub</h1>
                <div class="flex items-center gap-4 mt-1">
                    <span class="text-[10px] text-cyan-400 font-bold uppercase tracking-widest">Pilot: Hiếu Nguyễn</span>
                    <div class="w-32 bg-slate-900 h-1 rounded-full overflow-hidden">
                        <div id="main-progress" class="h-full bg-cyan-400 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="text-right mt-6 md:mt-0">
            <div class="text-[10px] text-slate-500 uppercase font-bold mb-1">System Integrity</div>
            <div class="text-5xl font-black text-white" id="integrity-val">0%</div>
            <button onclick="openAuth()" id="auth-btn" class="mt-4 text-[9px] border border-cyan-500/30 px-6 py-2 rounded-full text-cyan-400 hover:bg-cyan-500/10 transition">
                [ TRUY CẬP HỆ THỐNG ]
            </button>
        </div>
    </header>

    <main id="mission-grid" class="space-y-32 relative"></main>
</div>

<div id="auth-overlay" style="display: none;">
    <div class="text-center p-12 node-web3 border-cyan-500/50">
        <h2 class="text-cyan-400 mb-8 uppercase tracking-[0.3em] text-sm">Xác nhận Chỉ huy</h2>
        <div class="flex gap-4 justify-center mb-10" id="auth-dots">
            <div class="numpad-dot"></div><div class="numpad-dot"></div><div class="numpad-dot"></div><div class="numpad-dot"></div>
        </div>
        <p class="text-[10px] text-slate-500 animate-pulse italic">Dùng bàn phím để nhập mã truy cập...</p>
    </div>
</div>

<script>
    // --- 1. Tạo hiệu ứng sao nền ---
    const nebula = document.getElementById('nebula-bg');
    for(let i=0; i<150; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random()*100 + '%';
        star.style.top = Math.random()*100 + '%';
        const size = Math.random()*2 + 'px';
        star.style.width = size; star.style.height = size;
        star.style.setProperty('--d', (Math.random()*3 + 2) + 's');
        nebula.appendChild(star);
    }

    // --- 2. Dữ liệu 50 bước ---
    const stages = ["I. KHỞI TẠO", "II. THAM MƯU", "III. XÂY DỰNG", "IV. HỆ SINH THÁI", "V. IPO"];
    const titles = ["Chốt cổ đông", "Xác lập IP", "Tuyển Core 5", "Pháp nhân DITP", "MOU HTC", "Bản quyền 9.0", "VP R&D", "Hồ sơ Liên minh", "Ngân sách 12T", "Demo v1.0"];
    
    let steps = Array.from({length: 50}, (_, i) => ({
        id: i + 1,
        stage: Math.ceil((i+1)/10),
        title: i < 10 ? titles[i] : `Nhiệm vụ #${i+1}`,
        completed: false,
        docs: [],
        journal: ""
    }));

    // --- 3. Logic Persistence (LocalStorage) ---
    function saveProgress() {
        localStorage.setItem('DITP_SAVE_V9', JSON.stringify(steps));
    }

    function loadProgress() {
        const saved = localStorage.getItem('DITP_SAVE_V9');
        if(saved) {
            const parsed = JSON.parse(saved);
            steps.forEach((s, i) => {
                if(parsed[i]) {
                    s.completed = parsed[i].completed;
                    s.journal = parsed[i].journal;
                    s.docs = parsed[i].docs;
                }
            });
        }
    }

    // --- 4. Quản trị & Bảo mật ---
    let isCommander = false;
    let pin = "";
    const MASTER_KEY = "1234";

    function openAuth() { document.getElementById('auth-overlay').style.display = 'flex'; }
    
    window.addEventListener('keydown', (e) => {
        if (document.getElementById('auth-overlay').style.display === 'flex') {
            if (e.key >= '0' && e.key <= '9') {
                pin += e.key;
                updateDots();
                if (pin === MASTER_KEY) {
                    isCommander = true;
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('auth-btn').innerText = "[ ĐÃ XÁC THỰC ]";
                    document.getElementById('auth-btn').className = "mt-4 text-[9px] border border-green-500 px-6 py-2 rounded-full text-green-400";
                    renderMap();
                } else if (pin.length >= 4) { pin = ""; updateDots(); }
            }
            if (e.key === 'Escape') { document.getElementById('auth-overlay').style.display = 'none'; pin = ""; updateDots(); }
        }
    });

    function updateDots() {
        const dots = document.getElementById('auth-dots').children;
        for(let i=0; i<4; i++) dots[i].className = pin.length > i ? 'numpad-dot filled' : 'numpad-dot';
    }

    // --- 5. Xử lý Nhiệm vụ ---
    function handleTask(id) {
        if(!isCommander) return;
        const q = steps.find(s => s.id === id);
        if(id > 1 && !steps[id-2].completed && !q.completed) return;

        if(!q.completed) {
            const jour = prompt("Nhập nhật ký công việc:");
            if(!jour) return;
            const links = prompt("Dán các link tài liệu (cách nhau bằng dấu phẩy):");
            q.journal = jour;
            q.docs = links ? links.split(',').map(l => l.trim()) : [];
            q.completed = true;
        } else { q.completed = false; }
        
        saveProgress();
        renderMap();
    }

    // --- 6. Render Giao diện & Neural Paths ---
    function renderMap() {
        const grid = document.getElementById('mission-grid');
        grid.innerHTML = '';
        
        let done = steps.filter(s => s.completed).length;
        let prg = Math.round((done / 50) * 100);
        document.getElementById('main-progress').style.width = prg + '%';
        document.getElementById('integrity-val').innerText = prg + '%';

        stages.forEach((name, i) => {
            const stgId = i + 1;
            const stgSteps = steps.filter(s => s.stage === stgId);
            const stageSection = document.createElement('div');
            stageSection.innerHTML = `<h2 class="text-[10px] tracking-[0.8em] text-slate-500 mb-12 italic text-center uppercase opacity-50 underline">${name}</h2>`;
            
            const cardGrid = document.createElement('div');
            cardGrid.className = "grid grid-cols-2 lg:grid-cols-5 gap-8";

            stgSteps.forEach(q => {
                const avail = q.id === 1 || steps[q.id-2].completed;
                const status = q.completed ? 'completed' : (avail ? 'active' : 'locked');
                cardGrid.innerHTML += `
                    <div onclick="handleTask(${q.id})" id="node-${q.id}" class="node-web3 p-6 h-44 flex flex-col justify-between cursor-pointer ${status}">
                        <div>
                            <div class="text-[8px] opacity-40 mb-1">STATION ${q.id.toString().padStart(2,'0')}</div>
                            <div class="text-[11px] font-bold uppercase tracking-wider">${q.title}</div>
                        </div>
                        <div class="flex flex-wrap gap-1.5 mt-2">
                            ${q.docs.map((d, i) => `<a href="${d}" target="_blank" onclick="event.stopPropagation()" class="text-[7px] bg-cyan-950 border border-cyan-800 px-1.5 py-0.5 rounded text-cyan-400 hover:bg-cyan-400 hover:text-black">DATA ${i+1}</a>`).join('')}
                        </div>
                        <div class="text-[9px] italic text-slate-500 mt-2 truncate border-t border-slate-800 pt-2">${q.journal || 'Waiting...'}</div>
                    </div>
                `;
            });
            stageSection.appendChild(cardGrid);
            grid.appendChild(stageSection);
        });
    }

    loadProgress();
    renderMap();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DITP | GALAXY COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #31ada1; --bg: #010409; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .hud-panel { background: rgba(1, 4, 9, 0.9); border: 1px solid rgba(49, 173, 161, 0.3); border-radius: 12px; }
        .node-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 14px; transition: 0.3s; cursor: pointer; min-height: 130px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .completed { border-color: var(--neon); box-shadow: 0 0 15px rgba(49, 173, 161, 0.2); }
        .active { border-color: #00f2ff; box-shadow: 0 0 10px rgba(0, 242, 255, 0.1); }
        .locked { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        .key-btn { width: 55px; height: 55px; border: 1px solid var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--neon); cursor: pointer; font-family: 'Orbitron'; font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="hud-panel p-6 mb-8 flex justify-between items-center">
        <div>
            <h1 class="orbitron text-xl font-bold uppercase tracking-widest text-white">GALAXY COMMAND</h1>
            <p id="status-label" class="text-[9px] text-gray-500 uppercase mt-1">Đang truy vấn API Hub...</p>
        </div>
        <div class="text-right">
            <p id="integrity-val" class="orbitron text-2xl font-bold text-white">0%</p>
            <button onclick="showAuth()" id="auth-btn" class="text-[9px] orbitron border border-cyan-500 px-4 py-1.5 rounded text-cyan-500 uppercase mt-2">Commander Login</button>
        </div>
    </header>

    <div id="mission-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>

    <div id="auth-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(15px);">
        <div class="text-center">
            <div class="flex gap-4 mb-10 justify-center" id="auth-dots">
                <div class="w-3 h-3 rounded-full border border-white"></div><div class="w-3 h-3 rounded-full border border-white"></div><div class="w-3 h-3 rounded-full border border-white"></div><div class="w-3 h-3 rounded-full border border-white"></div>
            </div>
            <div class="grid grid-cols-3 gap-5">
                <button onclick="pressNum('1')" class="key-btn">1</button><button onclick="pressNum('2')" class="key-btn">2</button><button onclick="pressNum('3')" class="key-btn">3</button>
                <button onclick="pressNum('4')" class="key-btn">4</button><button onclick="pressNum('5')" class="key-btn">5</button><button onclick="pressNum('6')" class="key-btn">6</button>
                <button onclick="pressNum('7')" class="key-btn">7</button><button onclick="pressNum('8')" class="key-btn">8</button><button onclick="pressNum('9')" class="key-btn">9</button>
                <button onclick="clearPin()" class="key-btn text-xs">CLR</button><button onclick="pressNum('0')" class="key-btn">0</button><button onclick="closeAuth()" class="key-btn text-xs text-red-500">ESC</button>
            </div>
        </div>
    </div>

<script>
    const API_URL = "https://api.sheetbest.com/sheets/d418f240-85d9-4280-a1b2-3318dc6ba411"; 
    let missions = [];
    let isAdmin = false; 
    let isSyncing = false; // Biến chống loạn dữ liệu

    async function init() {
        await fetchData();
        // Tăng thời gian đồng bộ lên 8s để tránh xung đột lệnh PATCH và GET
        setInterval(fetchData, 8000); 
        
        window.addEventListener('keydown', (e) => {
            if (document.getElementById('auth-overlay').style.display === 'flex') {
                if (e.key >= '0' && e.key <= '9') pressNum(e.key);
                if (e.key === 'Backspace') clearPin();
            }
        });
    }

    async function fetchData() {
        if (isSyncing) return; // Nếu đang lưu dữ liệu thì không tải mới để tránh nháy đèn
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            // Xử lý mapping cực kỳ chặt chẽ
            missions = data.map((item, i) => {
                // Ép kiểu status về boolean chuẩn
                let rawStatus = item.status;
                let finalStatus = (rawStatus === "TRUE" || rawStatus === true || rawStatus === "true" || rawStatus === 1);
                
                return {
                    id: parseInt(item.id) || (i + 1),
                    title: item.title || "Node " + (i+1),
                    status: finalStatus,
                    note: item.note || "",
                    doc: item.doc || "#"
                };
            });
            
            render();
            document.getElementById('status-label').innerText = "VŨ TRỤ ĐÃ KẾT NỐI (2-WAY)";
        } catch (e) {
            document.getElementById('status-label').innerText = "MẤT KẾT NỐI API";
        }
    }

    async function toggleTask(id) {
        if (!isAdmin) { alert("YÊU CẦU COMMANDER LOGIN!"); return; }
        
        const idx = id - 1;
        const currentM = missions[idx];
        
        // Logic unlock tuần tự
        if (id > 1 && !missions[idx-1].status && !currentM.status) {
            alert("Vui lòng hoàn thành Node " + (id-1) + " trước!"); return;
        }

        isSyncing = true; // Khóa đồng bộ để tập trung lưu dữ liệu
        const nextS = !currentM.status;
        missions[idx].status = nextS;
        render(); // Cập nhật đèn sáng ngay lập tức trên Web

        try {
            // Gửi lệnh PATCH lên Sheet
            await fetch(`${API_URL}/${idx}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ "status": nextS ? "TRUE" : "FALSE" })
            });
            console.log("Saved Node " + id);
        } catch (e) { 
            alert("Lỗi lưu Sheet! Đang thử lại..."); 
        } finally {
            // Đợi 2 giây sau khi lưu mới cho phép đồng bộ lại để tránh dữ liệu cũ đè lên dữ liệu mới vừa tích
            setTimeout(() => { isSyncing = false; }, 2000);
        }
    }

    function render() {
        const grid = document.getElementById('mission-grid');
        if (!grid) return;
        grid.innerHTML = '';
        
        // Tính % dựa trên missions thực tế
        let done = missions.filter(m => m.status).length;
        document.getElementById('integrity-val').innerText = Math.round((done/missions.length)*100) + '%';

        missions.forEach((m, i) => {
            const avail = i === 0 || missions[i-1].status;
            const state = m.status ? 'completed' : (avail ? 'active' : 'locked');
            
            const card = document.createElement('div');
            card.className = `node-card ${state}`;
            card.onclick = () => toggleTask(m.id);
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <span class="text-[8px] orbitron opacity-40">NODE ${String(m.id).padStart(2, '0')}</span>
                    ${m.doc && m.doc !== "#" && m.doc !== "" ? 
                        `<a href="${m.doc}" target="_blank" onclick="event.stopPropagation()" class="text-[9px] text-cyan-400 border-b border-cyan-400 font-bold">DOC</a>` 
                        : ''}
                </div>
                <div class="mt-2">
                    <h3 class="text-[11px] font-bold uppercase tracking-tight leading-tight">${m.title}</h3>
                    <p class="text-[9px] text-emerald-400 italic mt-2 line-clamp-2">${m.note}</p>
                </div>
                ${m.status ? '<div class="absolute bottom-2 right-2 w-1.5 h-1.5 bg-emerald-500 rounded-full"></div>' : ''}
            `;
            grid.appendChild(card);
        });
    }
    function showAuth() { document.getElementById('auth-overlay').style.display = 'flex'; pin = ""; updateDots(); }
    function closeAuth() { document.getElementById('auth-overlay').style.display = 'none'; }
    function clearPin() { pin = ""; updateDots(); }
    function pressNum(n) {
        if (pin.length < 4) {
            pin += n; updateDots();
            if (pin === "1909") {
                isAdmin = true; 
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('auth-btn').innerText = "COMMANDER ACTIVE";
                document.getElementById('auth-btn').className = "text-[9px] orbitron bg-emerald-600 px-4 py-1.5 rounded text-white mt-2";
                render();
            } else if (pin.length === 4) setTimeout(clearPin, 300);
        }
    }
    function updateDots() {
        const ds = document.getElementById('auth-dots').children;
        for(let i=0; i<4; i++) ds[i].style.background = pin.length > i ? '#31ada1' : 'transparent';
    }
    init();
</script>
</body>
</html>

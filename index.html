<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DITP | GALAXY COMMAND v15.3</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ditp-green: #31ada1; --ditp-orange: #f37d26; --bg: #020617; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .nebula { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 80%); }
        
        .orb { width: 65px; height: 65px; position: absolute; cursor: pointer; transition: 0.5s; z-index: 10; }
        .orb-core { position: absolute; inset: 0; border-radius: 50%; border: 1px solid rgba(49, 173, 161, 0.3); background: radial-gradient(circle, rgba(49, 173, 161, 0.1) 0%, transparent 70%); animation: breathe 4s infinite ease-in-out; }
        .completed .orb-core { border-color: var(--ditp-green); box-shadow: 0 0 35px var(--ditp-green); background: rgba(49, 173, 161, 0.2); }
        .active .orb-core { border-color: var(--ditp-orange); box-shadow: 0 0 20px var(--ditp-orange); }
        .locked { opacity: 0.15; filter: grayscale(1); cursor: not-allowed; }

        .mascot { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); font-size: 26px; animation: float 3s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.15); opacity: 0.8; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .neural-svg { position: absolute; inset: 0; width: 100%; height: 8500px; pointer-events: none; z-index: 1; }
        .flow-line { fill: none; stroke: var(--ditp-green); stroke-width: 0.8; stroke-dasharray: 5, 15; animation: flow 20s linear infinite; opacity: 0.1; }
        @keyframes flow { to { stroke-dashoffset: -300; } }

        .hud { background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(49, 173, 161, 0.2); }
    </style>
</head>
<body>

<div class="nebula"></div>
<svg class="neural-svg" id="neural-net"></svg>

<div class="relative z-10">
    <header class="hud sticky top-0 p-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-4">
            <img src="Logo-chia-se-trach-nhiem.png" class="w-12 h-12" onerror="this.src='https://via.placeholder.com/48'">
            <div>
                <h1 class="text-xs font-black tracking-[0.2em] uppercase italic">DITP GALAXY HUB v15.3</h1>
                <div class="flex items-center gap-2 mt-1">
                    <div class="w-24 bg-white/5 h-1 rounded-full overflow-hidden"><div id="p-bar" class="h-full bg-[#31ada1]" style="width: 0%"></div></div>
                    <span id="p-text" class="text-[9px] text-[#31ada1] font-bold uppercase tracking-widest">Syncing</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span id="sync-status" class="text-[8px] text-slate-500 font-bold uppercase tracking-widest italic">Checking Cloud...</span>
            <button onclick="showAuth()" id="auth-btn" class="text-[9px] border border-[#31ada1]/30 px-5 py-2 rounded-full text-[#31ada1] hover:bg-[#31ada1]/10 transition uppercase">Master Key</button>
        </div>
    </header>

    <main id="star-map" class="relative w-full min-h-[8500px] pt-24 px-10"></main>
</div>

<script>
    const URL = 'https://txveokzzwizpgqcaacur.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4dmVva3p6d2l6cGdxY2FhY3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTkyNDIsImV4cCI6MjA4Nzg3NTI0Mn0.vhXbEasuPR5IyCfck9yPFpsMrcBwAxC36AuxF6GCl0w';
    const supabaseClient = supabase.createClient(URL, KEY);

    const titles = ["Chốt cổ đông", "Xác lập IP", "Tuyển Core 5", "Pháp nhân DITP", "MOU HTC", "Bản quyền 9.0", "VP R&D", "Hồ sơ Liên minh", "Ngân sách 12T", "Demo v1.0", "Pre-FS v1.6", "Tờ trình đầu tư", "Điều khoản ưu tiên", "Báo cáo C06", "Sandbox Scoring", "Dữ liệu sạch", "Ủng hộ Bộ", "Bảo mật C4", "Dashboard", "Phê duyệt", "Rà soát 15 Bộ", "Hợp nhất HC", "Hạ tầng DC", "VNeID thử", "API Dân cư", "An ninh mạng", "App Cán bộ", "Chạy điểm", "AI Tuning", "Nghiệm thu GĐ1", "Startup ngành", "Góp vốn IP", "BCC RAR", "Thuật toán TM", "Phí API", "MOU Ngân hàng", "Voucher An sinh", "VNeID Truyền thông", "Gọi vốn Startup", "1M Giao dịch", "Dòng tiền API", "Kiểm toán quốc tế", "Nâng cấp AI", "Phủ 15 nhóm", "Hội thảo Data", "Thoái vốn", "Lộ trình niêm yết", "Báo cáo ESG", "Nộp hồ sơ", "IPO"];
    const emojis = ["🤖", "🐱", "🦆", "⚙️", "🤝", "📊", "🛡️", "📜", "💰", "🚀"];

    let missions = Array.from({length: 50}, (_, i) => ({
        id: i + 1, title: titles[i], status: false,
        x: (i % 2 === 0 ? 15 : 75) + Math.sin(i) * 12,
        y: i * 165 + 100
    }));

    let isAdmin = false;

    async function init() {
        render(); // Vẽ khung trước
        await fetchCloudData();
        
        // Lắng nghe thay đổi Real-time
        supabaseClient
            .channel('public:missions')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'missions' }, payload => {
                const m = missions.find(x => x.id === payload.new.id);
                if (m) { m.status = payload.new.status; render(); }
            })
            .subscribe();
    }

    async function fetchCloudData() {
        const { data, error } = await supabaseClient.from('missions').select('*').order('id', { ascending: true });
        if (data && data.length > 0) {
            data.forEach(row => {
                const m = missions.find(x => x.id === row.id);
                if (m) m.status = row.status;
            });
            document.getElementById('sync-status').innerText = "Cloud: Synchronized";
            render();
        } else {
            document.getElementById('sync-status').innerText = "Cloud: Empty (Run SQL Script)";
        }
    }

    async function toggleTask(id) {
        if (!isAdmin) return;
        const m = missions.find(x => x.id === id);
        if (id > 1 && !missions[id-2].status && !m.status) return;
        
        m.status = !m.status;
        render();

        const { error } = await supabaseClient
            .from('missions')
            .update({ status: m.status })
            .eq('id', id);
            
        if (error) alert("Lỗi ghi dữ liệu: " + error.message);
    }

    function render() {
        const map = document.getElementById('star-map');
        const svg = document.getElementById('neural-net');
        if (!map) return;
        map.innerHTML = ''; svg.innerHTML = '';

        let done = missions.filter(m => m.status).length;
        document.getElementById('p-text').innerText = Math.round((done/50)*100) + '%';
        document.getElementById('p-bar').style.width = (done/50)*100 + '%';

        missions.forEach((m, i) => {
            const avail = i === 0 || missions[i-1].status;
            const state = m.status ? 'completed' : (avail ? 'active' : 'locked');
            
            const el = document.createElement('div');
            el.className = `orb ${state}`;
            el.style.left = m.x + '%'; el.style.top = m.y + 'px';
            el.onclick = () => toggleTask(m.id);
            el.innerHTML = `
                ${m.status ? `<div class="mascot">${emojis[i % emojis.length]}</div>` : ''}
                <div class="orb-core"></div>
                <div class="absolute -right-44 top-5 w-40 text-[9px] font-bold text-slate-500 uppercase tracking-widest leading-tight">${m.title}</div>
            `;
            map.appendChild(el);

            if (i > 0) {
                const prev = missions[i-1];
                const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const d = `M ${prev.x+3}% ${prev.y+30} Q ${(prev.x+m.x)/2}% ${(prev.y+m.y)/2} ${m.x+3}% ${m.y+30}`;
                line.setAttribute("d", d);
                line.setAttribute("class", "flow-line");
                if (prev.status) line.style.opacity = "0.7";
                svg.appendChild(line);
            }
        });
    }

    function showAuth() {
        const p = prompt("Nhập mã Chỉ huy (1909):");
        if(p === "1909") {
            isAdmin = true;
            document.getElementById('auth-btn').innerText = "MASTER ACTIVE";
            render();
        }
    }

    init();
</script>
</body>
</html>

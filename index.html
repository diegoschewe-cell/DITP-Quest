<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DITP | THE MULTIVERSE v12.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #00f2ff; --green: #0cf3a8; --bg: #020617; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* Không gian tinh vân động */
        .nebula { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a192f 0%, #020617 100%); }
        
        /* Thực thể năng lượng Orb (Vật thể hóa nhiệm vụ) */
        .orb { width: 50px; height: 50px; position: absolute; cursor: pointer; transition: 0.5s; transform-style: preserve-3d; }
        .orb-core { position: absolute; inset: 0; border-radius: 50%; border: 1px solid rgba(0,242,255,0.2); background: radial-gradient(circle, rgba(0,242,255,0.1) 0%, transparent 70%); animation: breathe 4s infinite ease-in-out; }
        .completed .orb-core { border-color: var(--green); background: radial-gradient(circle, var(--green) 0%, transparent 70%); box-shadow: 0 0 30px var(--green); }
        .active .orb-core { border-color: var(--blue); box-shadow: 0 0 20px var(--blue); }
        .locked { opacity: 0.15; filter: blur(2px); cursor: not-allowed; }

        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.2); opacity: 0.8; } }
        
        /* Neural Flow Path */
        .neural-svg { position: absolute; inset: 0; width: 100%; height: 8000px; pointer-events: none; z-index: 0; }
        .flow-line { fill: none; stroke: var(--blue); stroke-width: 0.8; stroke-dasharray: 5, 15; animation: flow 20s linear infinite; opacity: 0.2; }
        @keyframes flow { to { stroke-dashoffset: -300; } }

        /* HUD & Auth */
        .hud { background: rgba(0,0,0,0.7); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        #auth-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(2,6,23,0.98); display: none; align-items: center; justify-content: center; backdrop-filter: blur(30px); }
        .dot { width: 14px; height: 14px; border: 2px solid var(--blue); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--blue); box-shadow: 0 0 15px var(--blue); }
    </style>
</head>
<body>

<div class="nebula"></div>
<svg class="neural-svg" id="neural-net"></svg>

<div class="relative z-10">
    <header class="hud sticky top-0 p-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-6">
            <img src="logo-ditp.png" class="w-14 h-14" onerror="this.src='https://via.placeholder.com/56'">
            <div>
                <h1 class="text-xl font-black italic tracking-tighter uppercase">DITP Galaxy Command</h1>
                <div class="flex items-center gap-3 mt-1">
                    <div class="w-32 h-1 bg-white/5 rounded-full overflow-hidden"><div id="p-bar" class="h-full bg-cyan-400 transition-all duration-1000" style="width: 0%"></div></div>
                    <span id="p-text" class="text-[10px] text-cyan-400 font-bold">0%</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-6 text-right">
            <div id="sync-icon" class="text-[8px] text-slate-500 font-bold tracking-[0.3em] uppercase">Cloud Synced</div>
            <button onclick="showAuth()" id="auth-trigger" class="text-[9px] border border-cyan-500/30 px-5 py-2 rounded-full text-cyan-400 hover:bg-cyan-500/10 transition">[ TRUY CẬP CHỈ HUY ]</button>
        </div>
    </header>

    <main id="star-map" class="relative w-full min-h-[8000px] px-10 pt-20"></main>
</div>

<div id="auth-overlay">
    <div class="text-center">
        <div class="flex gap-5 justify-center mb-10" id="auth-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <p class="text-cyan-400 text-xs font-bold tracking-[0.5em] animate-pulse">NHẬP MÃ 1909 TỪ BÀN PHÍM</p>
    </div>
</div>

<script>
    // --- CẤU HÌNH SUPABASE ---
    const DB_URL = 'https://txveokzzwizpgqcaacur.supabase.co';
    const DB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4dmVva3p6d2l6cGdxY2FhY3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTkyNDIsImV4cCI6MjA4Nzg3NTI0Mn0.vhXbEasuPR5IyCfck9yPFpsMrcBwAxC36AuxF6GCl0w';
    const supabase = supabaseJs.createClient(DB_URL, DB_KEY);

    const titles = ["Chốt cổ đông", "Xác lập IP", "Tuyển Core 5", "Pháp nhân DITP", "MOU HTC", "Bản quyền 9.0", "VP R&D", "Hồ sơ Liên minh", "Ngân sách 12T", "Demo v1.0", "Pre-FS v1.6", "Tờ trình đầu tư", "Điều khoản ưu tiên", "Báo cáo C06", "Sandbox Scoring", "Dữ liệu sạch", "Ủng hộ Bộ", "Bảo mật C4", "Dashboard", "Phê duyệt", "Rà soát 15 Bộ", "Hợp nhất HC", "Hạ tầng DC", "VNeID thử", "API Dân cư", "An ninh mạng", "App Cán bộ", "Chạy điểm", "AI Tuning", "Nghiệm thu GĐ1", "Startup ngành", "Góp vốn IP", "BCC RAR", "Thuật toán TM", "Phí API", "MOU Ngân hàng", "Voucher An sinh", "VNeID Truyền thông", "Gọi vốn Startup", "1M Giao dịch", "Dòng tiền API", "Kiểm toán quốc tế", "Nâng cấp AI", "Phủ 15 nhóm", "Hội thảo Data", "Thoái vốn", "Lộ trình niêm yết", "Báo cáo ESG", "Nộp hồ sơ", "IPO"];

    let missions = Array.from({length: 50}, (_, i) => ({
        id: i + 1,
        title: titles[i] || `Nhiệm vụ ${i+1}`,
        status: false,
        x: (i % 2 === 0 ? 15 : 65) + Math.sin(i) * 8,
        y: i * 160 + 100
    }));

    let isCommander = false;
    let pin = "";
    const MASTER_PIN = "1909";

    // --- LOGIC ĐỒNG BỘ ---
    async function syncData() {
        const { data } = await supabase.from('missions').select('*');
        if (data) {
            data.forEach(row => {
                const m = missions.find(x => x.id === row.id);
                if (m) m.status = row.status;
            });
        }
        render();
    }

    async function toggleTask(id) {
        if (!isCommander) return;
        const m = missions.find(x => x.id === id);
        if (id > 1 && !missions[id-2].status && !m.status) return;

        m.status = !m.status;
        await supabase.from('missions').upsert({ id: id, status: m.status });
        render();
    }

    // --- REAL-TIME LISTENER ---
    supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'missions' }, () => syncData()).subscribe();

    // --- AUTH ---
    function showAuth() { document.getElementById('auth-overlay').style.display = 'flex'; }
    window.addEventListener('keydown', (e) => {
        if (document.getElementById('auth-overlay').style.display === 'flex') {
            if (e.key >= '0' && e.key <= '9') {
                pin += e.key;
                const dots = document.getElementById('auth-dots').children;
                for(let i=0; i<4; i++) dots[i].className = pin.length > i ? 'dot active' : 'dot';
                if (pin === MASTER_PIN) {
                    isCommander = true;
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('auth-trigger').innerText = "COMMANDER ACTIVE";
                    document.getElementById('auth-trigger').classList.replace('text-cyan-400', 'text-green-400');
                    render();
                } else if (pin.length >= 4) { pin = ""; for(let i=0; i<4; i++) dots[i].className = 'dot'; }
            }
        }
    });

    // --- RENDER ---
    function render() {
        const map = document.getElementById('star-map');
        const svg = document.getElementById('neural-net');
        map.innerHTML = ''; svg.innerHTML = '';

        let done = missions.filter(m => m.status).length;
        document.getElementById('p-text').innerText = Math.round((done/50)*100) + '%';
        document.getElementById('p-bar').style.width = (done/50)*100 + '%';

        missions.forEach((m, i) => {
            const avail = i === 0 || missions[i-1].status;
            const state = m.status ? 'completed' : (avail ? 'active' : 'locked');
            
            const el = document.createElement('div');
            el.className = `orb ${state}`;
            el.style.left = m.x + '%'; el.style.top = m.y + 'px';
            el.onclick = () => toggleTask(m.id);
            el.innerHTML = `<div class="orb-core"></div><div class="absolute -right-48 top-4 w-40 text-[9px] font-bold text-slate-500 uppercase tracking-widest">${m.title}</div>`;
            map.appendChild(el);

            if (i > 0) {
                const prev = missions[i-1];
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const d = `M ${prev.x+2}% ${prev.y+25} Q ${(prev.x+m.x)/2}% ${(prev.y+m.y)/2} ${m.x+2}% ${m.y+25}`;
                path.setAttribute("d", d);
                path.setAttribute("class", "flow-line");
                if (prev.status) path.style.opacity = "0.7";
                svg.appendChild(path);
            }
        });
    }

    syncData();
</script>
</body>
</html>

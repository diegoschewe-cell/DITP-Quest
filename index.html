<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DITP | GALAXY HUB v16.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ditp-green: #31ada1; --ditp-orange: #f37d26; --bg: #010409; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; touch-action: pan-y; }
        .nebula { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #0a192f 0%, #010409 100%); }
        
        /* Thực thể Orb Web3 */
        .orb { width: 55px; height: 55px; position: absolute; cursor: pointer; transition: 0.5s; z-index: 10; }
        .orb-core { position: absolute; inset: 0; border-radius: 50%; border: 1px solid rgba(49, 173, 161, 0.3); background: radial-gradient(circle, rgba(49, 173, 161, 0.1) 0%, transparent 70%); animation: breathe 4s infinite; }
        .completed .orb-core { border-color: var(--ditp-green); box-shadow: 0 0 30px var(--ditp-green); background: rgba(49, 173, 161, 0.2); }
        .active .orb-core { border-color: var(--ditp-orange); box-shadow: 0 0 15px var(--ditp-orange); }
        
        .mascot-emoji { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); font-size: 22px; animation: float 3s infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.1); opacity: 0.8; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* Neural Path */
        .neural-svg { position: absolute; inset: 0; width: 100%; height: 8500px; pointer-events: none; z-index: 1; }
        .flow-line { fill: none; stroke: var(--ditp-green); stroke-width: 0.7; stroke-dasharray: 5, 15; animation: flow 20s linear infinite; opacity: 0.15; }
        @keyframes flow { to { stroke-dashoffset: -300; } }

        .hud { background: rgba(1, 4, 9, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(49, 173, 161, 0.2); }
    </style>
</head>
<body>

<div class="nebula"></div>
<svg class="neural-svg" id="neural-net"></svg>

<div class="relative z-10">
    <header class="hud sticky top-0 p-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-4">
            <img src="Logo-chia-se-trach-nhiem.png" class="w-10 h-10" onerror="this.src='https://via.placeholder.com/40'">
            <div>
                <h1 class="text-[9px] font-black tracking-widest uppercase italic">DITP GALAXY COMMAND</h1>
                <div class="flex items-center gap-2 mt-0.5">
                    <div class="w-20 bg-white/5 h-1 rounded-full overflow-hidden"><div id="p-bar" class="h-full bg-[#31ada1]" style="width: 0%"></div></div>
                    <span id="p-text" class="text-[8px] text-[#31ada1] font-bold uppercase">CLOUD SYNCED</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span id="sync-status" class="text-[7px] text-slate-500 font-bold uppercase italic tracking-tighter">Initialising Hub...</span>
            <button onclick="showAuth()" id="auth-btn" class="text-[8px] border border-[#31ada1]/40 px-3 py-1.5 rounded-full text-[#31ada1] hover:bg-[#31ada1]/10 uppercase transition">Admin (1909)</button>
        </div>
    </header>

    <main id="star-map" class="relative w-full min-h-[8500px] pt-16 px-6"></main>
</div>

<div id="auth-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:1000; align-items:center; justify-content:center;">
    <div class="text-center">
        <div class="flex gap-4 justify-center mb-8" id="dots">
            <div class="w-3 h-3 rounded-full border border-[#31ada1]"></div><div class="w-3 h-3 rounded-full border border-[#31ada1]"></div><div class="w-3 h-3 rounded-full border border-[#31ada1]"></div><div class="w-3 h-3 rounded-full border border-[#31ada1]"></div>
        </div>
        <p class="text-[#31ada1] text-[9px] font-bold tracking-[0.4em] animate-pulse uppercase">PIN: 1909</p>
    </div>
</div>

<script>
    const URL = 'https://txveokzzwizpgqcaacur.supabase.co';
    // ĐÃ CẬP NHẬT SERVICE ROLE KEY CỦA ANH HIẾU
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4dmVva3p6d2l6cGdxY2FhY3VyIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjI5OTI0MiwiZXhwIjoyMDg3ODc1MjQyfQ.-fXd3NLKgQHEtvCX31e7WCkP7u8G5aTBpoifEePpvDk';
    
    const titles = ["Chốt cổ đông", "Xác lập IP", "Tuyển Core 5", "Pháp nhân DITP", "MOU HTC", "Bản quyền 9.0", "VP R&D", "Hồ sơ Liên minh", "Ngân sách 12T", "Demo v1.0", "Pre-FS v1.6", "Tờ trình đầu tư", "Điều khoản ưu tiên", "Báo cáo C06", "Sandbox Scoring", "Dữ liệu sạch", "Ủng hộ Bộ", "Bảo mật C4", "Dashboard", "Phê duyệt", "Rà soát 15 Bộ", "Hợp nhất HC", "Hạ tầng DC", "VNeID thử", "API Dân cư", "An ninh mạng", "App Cán bộ", "Chạy điểm", "AI Tuning", "Nghiệm thu GĐ1", "Startup ngành", "Góp vốn IP", "BCC RAR", "Thuật toán TM", "Phí API", "MOU Ngân hàng", "Voucher An sinh", "VNeID Truyền thông", "Gọi vốn Startup", "1M Giao dịch", "Dòng tiền API", "Kiểm toán quốc tế", "Nâng cấp AI", "Phủ 15 nhóm", "Hội thảo Data", "Thoái vốn", "Lộ trình niêm yết", "Báo cáo ESG", "Nộp hồ sơ", "IPO"];
    const emojis = ["🤖", "🐱", "🦆", "⚙️", "🤝", "📊", "🛡️", "📜", "💰", "🚀"];

    let missions = Array.from({length: 50}, (_, i) => ({
        id: i + 1, title: titles[i], status: false,
        x: (i % 2 === 0 ? 12 : 55),
        y: i * 160 + 100
    }));

    let supabaseClient;
    let isAdmin = false;
    let pin = "";

    function init() {
        render(); 
        try {
            if (window.supabase) {
                supabaseClient = window.supabase.createClient(URL, KEY);
                fetchAndSubscribe();
                // Tự động quét lại Cloud mỗi 5 giây
                setInterval(fetchAndSubscribe, 5000);
            }
        } catch (e) { document.getElementById('sync-status').innerText = "Cloud Error"; }
    }

    async function fetchAndSubscribe() {
        const { data } = await supabaseClient.from('missions').select('*').order('id', { ascending: true });
        if (data) {
            data.forEach(row => {
                const m = missions.find(x => x.id === row.id);
                if (m) m.status = row.status;
            });
            document.getElementById('sync-status').innerText = "System: Online";
            render();
        }
    }

    async function toggleTask(id) {
        if (!isAdmin) return;
        const m = missions.find(x => x.id === id);
        if (id > 1 && !missions[id-2].status && !m.status) return;
        m.status = !m.status;
        render();
        if (supabaseClient) {
            await supabaseClient.from('missions').update({ status: m.status }).eq('id', id);
        }
    }

    function render() {
        const map = document.getElementById('star-map');
        const svg = document.getElementById('neural-net');
        if (!map) return;
        map.innerHTML = ''; svg.innerHTML = '';
        let done = missions.filter(m => m.status).length;
        document.getElementById('p-bar').style.width = (done/50)*100 + '%';
        missions.forEach((m, i) => {
            const avail = i === 0 || missions[i-1].status;
            const state = m.status ? 'completed' : (avail ? 'active' : 'locked');
            const el = document.createElement('div');
            el.className = `orb ${state}`;
            el.style.left = m.x + '%'; el.style.top = m.y + 'px';
            el.onclick = () => toggleTask(m.id);
            el.innerHTML = `${m.status ? `<div class="mascot-emoji">${emojis[i % emojis.length]}</div>` : ''}<div class="orb-core"></div><div class="absolute -right-32 top-5 w-28 text-[7px] font-bold text-slate-500 uppercase leading-tight">${m.title}</div>`;
            map.appendChild(el);
            if (i > 0) {
                const prev = missions[i-1];
                const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const d = `M ${prev.x+3}% ${prev.y+25} Q ${(prev.x+m.x)/2}% ${(prev.y+m.y)/2} ${m.x+3}% ${m.y+25}`;
                line.setAttribute("d", d);
                line.setAttribute("class", "flow-line");
                svg.appendChild(line);
            }
        });
    }

    function showAuth() { document.getElementById('auth-overlay').style.display = 'flex'; }
    window.addEventListener('keydown', (e) => {
        if (document.getElementById('auth-overlay').style.display === 'flex') {
            if (e.key >= '0' && e.key <= '9') {
                pin += e.key;
                const ds = document.getElementById('auth-dots').children;
                for(let i=0; i<4; i++) ds[i].style.background = pin.length > i ? '#31ada1' : 'transparent';
                if (pin === "1909") { isAdmin = true; document.getElementById('auth-overlay').style.display = 'none'; document.getElementById('auth-btn').innerText = "MASTER KEY"; render(); }
                else if (pin.length >= 4) { pin = ""; }
            }
        }
    });
    init();
</script>
</body>
</html>

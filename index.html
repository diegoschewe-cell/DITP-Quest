<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DITP | GALAXY COMMAND v15.4</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ditp-green: #31ada1; --ditp-orange: #f37d26; --bg: #020617; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .nebula { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 80%); }
        
        /* Thực thể Orb năng lượng */
        .orb { width: 60px; height: 60px; position: absolute; cursor: pointer; transition: 0.5s; z-index: 10; }
        .orb-core { position: absolute; inset: 0; border-radius: 50%; border: 1px solid rgba(49, 173, 161, 0.3); background: radial-gradient(circle, rgba(49, 173, 161, 0.1) 0%, transparent 70%); animation: breathe 4s infinite ease-in-out; }
        .completed .orb-core { border-color: var(--ditp-green); box-shadow: 0 0 30px var(--ditp-green); background: rgba(49, 173, 161, 0.2); }
        .active .orb-core { border-color: var(--ditp-orange); box-shadow: 0 0 15px var(--ditp-orange); }
        .locked { opacity: 0.15; filter: grayscale(1); cursor: not-allowed; }

        .mascot-emoji { position: absolute; top: -40px; left: 50%; transform: translateX(-50%); font-size: 24px; animation: float 3s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.1); opacity: 0.8; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Neural Path */
        .neural-svg { position: absolute; inset: 0; width: 100%; height: 8500px; pointer-events: none; z-index: 1; }
        .flow-line { fill: none; stroke: var(--ditp-green); stroke-width: 0.6; stroke-dasharray: 4, 12; animation: flow 15s linear infinite; opacity: 0.1; }
        @keyframes flow { to { stroke-dashoffset: -200; } }

        /* HUD Header */
        .hud { background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(49, 173, 161, 0.2); }
        #auth-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(2, 6, 23, 0.98); display: none; align-items: center; justify-content: center; backdrop-filter: blur(30px); }
        .dot { width: 12px; height: 12px; border: 1px solid var(--ditp-green); border-radius: 50%; transition: 0.3s; }
        .dot.filled { background: var(--ditp-green); box-shadow: 0 0 10px var(--ditp-green); }
    </style>
</head>
<body>

<div class="nebula"></div>
<svg class="neural-svg" id="neural-net"></svg>

<div class="relative z-10">
    <header class="hud sticky top-0 p-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-4">
            <img src="Logo-chia-se-trach-nhiem.png" class="w-12 h-12" onerror="this.src='https://via.placeholder.com/48'">
            <div>
                <h1 class="text-xs font-black tracking-[0.2em] uppercase italic">DITP GALAXY HUB v15.4</h1>
                <div class="flex items-center gap-2 mt-1">
                    <div class="w-24 bg-white/5 h-1 rounded-full overflow-hidden"><div id="p-bar" class="h-full bg-[#31ada1]" style="width: 0%"></div></div>
                    <span id="p-text" class="text-[9px] text-[#31ada1] font-bold uppercase">Ready</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span id="sync-status" class="text-[8px] text-slate-500 font-bold uppercase tracking-widest italic">Syncing Cloud...</span>
            <button onclick="showAuth()" id="auth-btn" class="text-[9px] border border-[#31ada1]/30 px-5 py-1.5 rounded-full text-[#31ada1] hover:bg-[#31ada1]/10 uppercase transition">Master Key</button>
        </div>
    </header>

    <main id="universe-map" class="relative w-full min-h-[8500px] pt-24 px-10"></main>
</div>

<div id="auth-overlay">
    <div class="text-center">
        <div class="flex gap-4 justify-center mb-8" id="dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <p class="text-[#31ada1] text-[10px] font-bold tracking-[0.4em] animate-pulse">NHẬP MÃ 1909</p>
    </div>
</div>

<script>
    // --- KHAI BÁO DỮ LIỆU ---
    const missionTitles = ["Chốt cổ đông", "Xác lập IP", "Tuyển Core 5", "Pháp nhân DITP", "MOU HTC", "Bản quyền 9.0", "VP R&D", "Hồ sơ Liên minh", "Ngân sách 12T", "Demo v1.0", "Pre-FS v1.6", "Tờ trình đầu tư", "Điều khoản ưu tiên", "Báo cáo C06", "Sandbox Scoring", "Dữ liệu sạch", "Ủng hộ Bộ", "Bảo mật C4", "Dashboard", "Phê duyệt", "Rà soát 15 Bộ", "Hợp nhất HC", "Hạ tầng DC", "VNeID thử", "API Dân cư", "An ninh mạng", "App Cán bộ", "Chạy điểm", "AI Tuning", "Nghiệm thu GĐ1", "Startup ngành", "Góp vốn IP", "BCC RAR", "Thuật toán TM", "Phí API", "MOU Ngân hàng", "Voucher An sinh", "VNeID Truyền thông", "Gọi vốn Startup", "1M Giao dịch", "Dòng tiền API", "Kiểm toán quốc tế", "Nâng cấp AI", "Phủ 15 nhóm", "Hội thảo Data", "Thoái vốn", "Lộ trình niêm yết", "Báo cáo ESG", "Nộp hồ sơ", "IPO"];
    const emojis = ["🤖", "🐱", "🦆", "⚙️", "🤝", "📊", "🛡️", "📜", "💰", "🚀"];

    let missions = Array.from({length: 50}, (_, i) => ({
        id: i + 1, title: missionTitles[i], status: false,
        x: (i % 2 === 0 ? 15 : 75) + Math.sin(i) * 12,
        y: i * 165 + 100
    }));

    const URL = 'https://txveokzzwizpgqcaacur.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4dmVva3p6d2l6cGdxY2FhY3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTkyNDIsImV4cCI6MjA4Nzg3NTI0Mn0.vhXbEasuPR5IyCfck9yPFpsMrcBwAxC36AuxF6GCl0w';
    
    let supabaseClient;
    let isAdmin = false;
    let pin = "";

    // --- KHỞI TẠO HỆ THỐNG ---
    function init() {
        render(); // Vẽ bản đồ ngay lập tức để không bị trắng trang
        
        try {
            // Khởi tạo Supabase qua thư viện UMD mới
            supabaseClient = window.supabase.createClient(URL, KEY);
            fetchCloudData();
        } catch (e) {
            console.error("Lỗi khởi tạo Supabase:", e);
            document.getElementById('sync-status').innerText = "Cloud Error";
        }
    }

    async function fetchCloudData() {
        const { data, error } = await supabaseClient.from('missions').select('*').order('id', { ascending: true });
        if (data) {
            data.forEach(row => {
                const m = missions.find(x => x.id === row.id);
                if (m) m.status = row.status;
            });
            document.getElementById('sync-status').innerText = "Cloud: Sync OK";
            render();
        } else if (error) {
            document.getElementById('sync-status').innerText = "Cloud Connection Failed";
        }
    }

    async function toggleTask(id) {
        if (!isAdmin) return;
        const m = missions.find(x => x.id === id);
        if (id > 1 && !missions[id-2].status && !m.status) return;
        
        m.status = !m.status;
        render();

        if (supabaseClient) {
            await supabaseClient.from('missions').update({ status: m.status }).eq('id', id);
        }
    }

    function render() {
        const map = document.getElementById('universe-map');
        const svg = document.getElementById('neural-net');
        if (!map) return;
        map.innerHTML = ''; svg.innerHTML = '';

        let done = missions.filter(m => m.status).length;
        document.getElementById('p-text').innerText = Math.round((done/50)*100) + '%';
        document.getElementById('p-bar').style.width = (done/50)*100 + '%';

        missions.forEach((m, i) => {
            const avail = i === 0 || missions[i-1].status;
            const state = m.status ? 'completed' : (avail ? 'active' : 'locked');
            
            const el = document.createElement('div');
            el.className = `orb ${state}`;
            el.style.left = m.x + '%'; el.style.top = m.y + 'px';
            el.onclick = () => toggleTask(m.id);
            el.innerHTML = `
                ${m.status ? `<div class="mascot-emoji">${emojis[i % emojis.length]}</div>` : ''}
                <div class="orb-core"></div>
                <div class="absolute -right-44 top-5 w-40 text-[9px] font-bold text-slate-500 uppercase tracking-widest leading-tight">${m.title}</div>
            `;
            map.appendChild(el);

            if (i > 0) {
                const prev = missions[i-1];
                const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const d = `M ${prev.x+3}% ${prev.y+30} Q ${(prev.x+m.x)/2}% ${(prev.y+m.y)/2} ${m.x+3}% ${m.y+30}`;
                line.setAttribute("d", d);
                line.setAttribute("class", "flow-line");
                if (prev.status) line.style.opacity = "0.6";
                svg.appendChild(line);
            }
        });
    }

    function showAuth() { document.getElementById('auth-overlay').style.display = 'flex'; }
    window.addEventListener('keydown', (e) => {
        if (document.getElementById('auth-overlay').style.display === 'flex') {
            if (e.key >= '0' && e.key <= '9') {
                pin += e.key;
                const ds = document.getElementById('dots').children;
                for(let i=0; i<4; i++) ds[i].className = pin.length > i ? 'dot filled' : 'dot';
                if (pin === "1909") {
                    isAdmin = true;
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('auth-btn').innerText = "COMMANDER ACTIVE";
                    render();
                } else if (pin.length >= 4) { pin = ""; }
            }
        }
    });

    init();
</script>
</body>
</html>

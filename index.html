<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DITP | GALAXY COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #31ada1; --bg: #010409; }
        body { background: var(--bg); color: white; font-family: sans-serif; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .node-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px; cursor: pointer; min-height: 125px; transition: 0.3s; position: relative; }
        .completed { border-color: var(--neon); box-shadow: 0 0 15px rgba(49, 173, 161, 0.2); }
        .active { border-color: #00f2ff; box-shadow: 0 0 10px rgba(0, 242, 255, 0.1); }
        .locked { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        .key-btn { width: 55px; height: 55px; border: 1px solid var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--neon); cursor: pointer; font-family: 'Orbitron'; }
    </style>
</head>
<body class="p-6">
    <header class="flex justify-between items-center mb-8 bg-gray-900/50 p-6 rounded-xl border border-gray-800">
        <div>
            <h1 class="orbitron text-xl font-bold uppercase tracking-widest">GALAXY COMMAND</h1>
            <p id="status-label" class="text-[9px] text-gray-500 mt-1 uppercase">Đang kết nối API Hub...</p>
        </div>
        <div class="text-right">
            <p id="integrity-val" class="orbitron text-2xl font-bold">0%</p>
            <button onclick="showAuth()" id="auth-btn" class="text-[9px] orbitron border border-cyan-500 px-3 py-1 rounded text-cyan-500 uppercase mt-2">Commander Login</button>
        </div>
    </header>

    <div id="mission-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>

    <div id="auth-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(15px);">
        <div class="text-center">
            <div class="flex gap-4 mb-10 justify-center" id="auth-dots">
                <div class="w-3 h-3 rounded-full border border-white"></div><div class="w-3 h-3 rounded-full border border-white"></div><div class="w-3 h-3 rounded-full border border-white"></div><div class="w-3 h-3 rounded-full border border-white"></div>
            </div>
            <div class="grid grid-cols-3 gap-5">
                <button onclick="pressNum('1')" class="key-btn">1</button><button onclick="pressNum('2')" class="key-btn">2</button><button onclick="pressNum('3')" class="key-btn">3</button>
                <button onclick="pressNum('4')" class="key-btn">4</button><button onclick="pressNum('5')" class="key-btn">5</button><button onclick="pressNum('6')" class="key-btn">6</button>
                <button onclick="pressNum('7')" class="key-btn">7</button><button onclick="pressNum('8')" class="key-btn">8</button><button onclick="pressNum('9')" class="key-btn">9</button>
                <button onclick="clearPin()" class="key-btn text-xs">CLR</button><button onclick="pressNum('0')" class="key-btn">0</button><button onclick="closeAuth()" class="key-btn text-xs text-red-500">ESC</button>
            </div>
        </div>
    </div>

<script>
    // THAY LINK SHEETBEST CỦA ANH VÀO ĐÂY
    const API_URL = "https://sheet.best/api/sheets/8265ed92-cefc-4c7b-a0c2-dfeb265da692"; 
    
    let missions = [];
    let isAdmin = false; let pin = "";

    async function init() {
        await fetchData();
        setInterval(fetchData, 5000); // Tự động cập nhật mỗi 5 giây
        
        window.addEventListener('keydown', (e) => {
            if (document.getElementById('auth-overlay').style.display === 'flex') {
                if (e.key >= '0' && e.key <= '9') pressNum(e.key);
                if (e.key === 'Backspace') clearPin();
            }
        });
    }

    async function fetchData() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            // ÁNH XẠ ĐÚNG TÊN CỘT TỪ ẢNH GOOGLE SHEET CỦA ANH
            missions = data.map((item, i) => ({
                id: i + 1,
                title: item["C"] || "Node " + (i+1), // Cột C: Tên nhiệm vụ
                status: (item["B"] === "TRUE" || item["B"] === true), // Cột B: Trạng thái
                note: item["D"] || "", // Cột D: Nhận xét
                doc: item["E"] || "#"  // Cột E: Link tài liệu
            }));
            
            render();
            document.getElementById('status-label').innerText = "API CONNECTED (LIVE)";
        } catch (e) {
            console.error(e);
            document.getElementById('status-label').innerText = "CONNECTION ERROR";
        }
    }

    async function toggleTask(id) {
        if (!isAdmin) { alert("YÊU CẦU COMMANDER LOGIN!"); return; }
        const idx = id - 1;
        const currentM = missions[idx];
        
        // Logic unlock tuần tự theo yêu cầu
        if (id > 1 && !missions[idx-1].status && !currentM.status) {
            alert("Phải xong Node " + (id-1) + " trước!"); return;
        }

        const nextStatus = !currentM.status;
        missions[idx].status = nextStatus;
        render();

        // Ghi dữ liệu trực tiếp vào Sheet qua API
        try {
            await fetch(`${API_URL}/${idx}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ "B": nextStatus ? "TRUE" : "FALSE" })
            });
        } catch (e) { alert("Lỗi lưu dữ liệu!"); }
    }

    function render() {
        const grid = document.getElementById('mission-grid');
        grid.innerHTML = '';
        let done = missions.filter(m => m.status).length;
        document.getElementById('integrity-val').innerText = Math.round((done/missions.length)*100) + '%';

        missions.forEach((m, i) => {
            const avail = i === 0 || missions[i-1].status;
            const state = m.status ? 'completed' : (avail ? 'active' : 'locked');
            const card = document.createElement('div');
            card.className = `node-card ${state}`;
            card.onclick = () => toggleTask(m.id);
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <span class="text-[8px] orbitron opacity-50">NODE ${m.id}</span>
                    ${m.doc && m.doc !== "#" ? `<a href="${m.doc}" target="_blank" onclick="event.stopPropagation()" class="text-[9px] text-cyan-400 border-b border-cyan-400">DOC</a>` : ''}
                </div>
                <h3 class="text-[10px] font-bold mt-2 uppercase leading-tight">${m.title}</h3>
                <p class="text-[9px] text-emerald-400 mt-2 italic line-clamp-2">${m.note}</p>
                ${m.status ? '<div class="absolute bottom-2 right-2 w-1.5 h-1.5 bg-emerald-500 rounded-full"></div>' : ''}
            `;
            grid.appendChild(card);
        });
    }

    function showAuth() { document.getElementById('auth-overlay').style.display = 'flex'; pin = ""; updateDots(); }
    function closeAuth() { document.getElementById('auth-overlay').style.display = 'none'; }
    function clearPin() { pin = ""; updateDots(); }
    function pressNum(n) {
        if (pin.length < 4) {
            pin += n; updateDots();
            if (pin === "1909") {
                isAdmin = true; document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('auth-btn').innerText = "COMMANDER ACTIVE";
                document.getElementById('auth-btn').className = "text-[9px] orbitron bg-emerald-600 px-3 py-1 rounded text-white mt-2";
                render();
            } else if (pin.length === 4) setTimeout(clearPin, 300);
        }
    }
    function updateDots() {
        const ds = document.getElementById('auth-dots').children;
        for(let i=0; i<4; i++) ds[i].style.background = pin.length > i ? '#31ada1' : 'transparent';
    }
    init();
</script>
</body>
</html>

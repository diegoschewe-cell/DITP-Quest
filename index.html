<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DITP | GALAXY HUB v21.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --ditp-green: #31ada1; 
            --ditp-orange: #f37d26; 
            --bg: #010409; 
            --neon-blue: #0ff; /* Cyan */
            --neon-green: #0f0; /* Lime green */
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; /* Prevent scrollbars with 3D */
            perspective: 1000px; /* For 3D effect */
        }
        .galaxy-background {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: 
                radial-gradient(circle at 50% 50%, #0a192f 0%, #010409 100%),
                url('https://www.transparenttextures.com/patterns/dark-matter.png'); /* Subtle texture */
            background-size: cover;
            animation: zoomOut 20s infinite alternate; /* Gentle zoom effect */
        }
        @keyframes zoomOut {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .hud { 
            background: rgba(1, 4, 9, 0.95); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(49, 173, 161, 0.2); 
            position: sticky; 
            top: 0; 
            z-index: 100;
        }

        #star-map {
            position: relative;
            width: 100%;
            height: 100vh; /* Full viewport height */
            display: flex;
            flex-wrap: wrap; /* Arrange items */
            justify-content: center;
            align-items: center;
            gap: 40px; /* Spacing between cubes */
            overflow-y: auto; /* Enable scroll for many cubes */
            padding: 80px 20px;
            box-sizing: border-box;
            z-index: 5;
        }

        .mission-cube {
            width: 120px; /* Larger cubes */
            height: 120px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(20deg) rotateY(-30deg); /* Initial 3D tilt */
            transition: transform 0.8s ease-out, box-shadow 0.5s ease-out;
            cursor: pointer;
            perspective: 600px; /* For internal cube rotation */
            border-radius: 8px; /* Softer edges */
            animation: floatCube 8s infinite alternate ease-in-out; /* Gentle floating */
        }

        @keyframes floatCube {
            0% { transform: translateY(0) rotateX(20deg) rotateY(-30deg); }
            50% { transform: translateY(-10px) rotateX(22deg) rotateY(-28deg); }
            100% { transform: translateY(0) rotateX(20deg) rotateY(-30deg); }
        }

        .mission-cube:hover {
            transform: scale(1.05) rotateX(15deg) rotateY(-25deg);
            z-index: 20; /* Bring hovered cube forward */
        }

        .cube-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            color: #ccc;
            opacity: 0.9;
            transition: all 0.5s ease;
            backface-visibility: hidden; /* Hide backface during rotation */
            border-radius: 8px;
        }
        /* Positions for 3D cube faces */
        .front  { transform: rotateY(0deg) translateZ(60px); }
        .back   { transform: rotateX(180deg) translateZ(60px); }
        .right  { transform: rotateY(90deg) translateZ(60px); }
        .left   { transform: rotateY(-90deg) translateZ(60px); }
        .top    { transform: rotateX(90deg) translateZ(60px); }
        .bottom { transform: rotateX(-90deg) translateZ(60px); }

        .mission-cube.active .cube-face {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue), inset 0 0 5px var(--neon-blue);
            color: var(--neon-blue);
        }
        .mission-cube.completed .cube-face {
            border-color: var(--neon-green);
            box-shadow: 0 0 25px var(--neon-green), inset 0 0 10px var(--neon-green);
            color: var(--neon-green);
        }

        .mission-title {
            position: absolute;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.7);
            bottom: 8px;
            width: 90%;
            pointer-events: none;
            text-shadow: 0 0 5px black;
        }
        .mission-emoji {
            font-size: 24px;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            animation: pulseEmoji 3s infinite ease-in-out alternate;
        }
        @keyframes pulseEmoji {
            0% { transform: translateX(-50%) scale(1); opacity: 0.8; }
            50% { transform: translateX(-50%) scale(1.1); opacity: 1; }
            100% { transform: translateX(-50%) scale(1); opacity: 0.8; }
        }

        /* Tooltip nhiệm vụ */
        .mission-tooltip {
            position: absolute;
            bottom: 100%; /* Position above the cube */
            left: 50%;
            transform: translateX(-50%);
            width: 280px; /* Larger tooltip */
            background: rgba(1, 4, 9, 0.95);
            border: 1px solid var(--neon-blue);
            border-radius: 10px;
            padding: 15px;
            font-size: 11px;
            color: #eee;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            display: none;
            z-index: 101;
            backdrop-filter: blur(15px);
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            pointer-events: none; /* Allows clicks on elements below */
        }
        .mission-cube:hover .mission-tooltip {
            display: block;
            opacity: 1;
            pointer-events: auto; /* Enable clicks when visible */
        }
        .mission-tooltip::before { /* Arrow for tooltip */
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 8px solid transparent;
            border-top-color: var(--neon-blue);
        }

        .key-btn { width: 55px; height: 55px; border: 1px solid rgba(49, 173, 161, 0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; color: var(--ditp-green); cursor: pointer; }

    </style>
</head>
<body>
<div class="galaxy-background"></div>

<div class="relative z-10">
    <header class="hud sticky top-0 p-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-4">
            <img src="Logo-chia-se-trach-nhiem.png" class="w-12 h-12 object-contain" onerror="this.src='https://via.placeholder.com/48?text=DITP'">
            <div>
                <h1 class="text-[9px] font-black tracking-widest uppercase italic text-[#31ada1]">DITP GALAXY HUB</h1>
                <div class="flex items-center gap-2 mt-0.5">
                    <div class="w-20 bg-white/5 h-1 rounded-full overflow-hidden"><div id="p-bar" class="h-full bg-[#31ada1] transition-all duration-500"></div></div>
                    <span id="sync-label" class="text-[8px] text-[#31ada1] font-bold uppercase italic">Syncing Excel...</span>
                </div>
            </div>
        </div>
        <button onclick="showAuth()" id="auth-btn" class="text-[8px] border border-[#31ada1]/40 px-4 py-1.5 rounded-full text-[#31ada1] uppercase">Commander</button>
    </header>
    <main id="star-map"></main>
</div>

<div id="auth-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(20px);">
    <div class="text-center w-64">
        <div class="flex gap-4 justify-center mb-10" id="auth-dots">
            <div class="dot w-3 h-3 rounded-full border border-[#31ada1]"></div><div class="dot w-3 h-3 rounded-full border border-[#31ada1]"></div><div class="dot w-3 h-3 rounded-full border border-[#31ada1]"></div><div class="dot w-3 h-3 rounded-full border border-[#31ada1]"></div>
        </div>
        <div class="grid grid-cols-3 gap-4 mb-8">
            <button onclick="pressNum('1')" class="key-btn">1</button><button onclick="pressNum('2')" class="key-btn">2</button><button onclick="pressNum('3')" class="key-btn">3</button>
            <button onclick="pressNum('4')" class="key-btn">4</button><button onclick="pressNum('5')" class="key-btn">5</button><button onclick="pressNum('6')" class="key-btn">6</button>
            <button onclick="pressNum('7')" class="key-btn">7</button><button onclick="pressNum('8')" class="key-btn">8</button><button onclick="pressNum('9')" class="key-btn">9</button>
            <button onclick="clearPin()" class="key-btn text-[10px]">CLR</button><button onclick="pressNum('0')" class="key-btn">0</button><button onclick="closeAuth()" class="key-btn text-[10px] text-red-500">ESC</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx05iotVqNi1yvApmFyAyGGxgoeVH2tvcD--oYFw1xzKA8KBC-zzFVWic3yNkiYLovmNQ/exec';
    
    const titles = ["Chốt cổ đông", "Xác lập IP", "Tuyển Core 5", "Pháp nhân DITP", "MOU HTC", "Bản quyền 9.0", "VP R&D", "Hồ sơ Liên minh", "Ngân sách 12T", "Demo v1.0", "Pre-FS v1.6", "Tờ trình đầu tư", "Điều khoản ưu tiên", "Báo cáo C06", "Sandbox Scoring", "Dữ liệu sạch", "Ủng hộ Bộ", "Bảo mật C4", "Dashboard", "Phê duyệt", "Rà soát 15 Bộ", "Hợp nhất HC", "Hạ tầng DC", "VNeID thử", "API Dân cư", "An ninh mạng", "App Cán bộ", "Chạy điểm", "AI Tuning", "Nghiệm thu GĐ1", "Startup ngành", "Góp vốn IP", "BCC RAR", "Thuật toán TM", "Phí API", "MOU Ngân hàng", "Voucher An sinh", "VNeID Truyền thông", "Gọi vốn Startup", "1M Giao dịch", "Dòng tiền API", "Kiểm toán quốc tế", "Nâng cấp AI", "Phủ 15 nhóm", "Hội thảo Data", "Thoái vốn", "Lộ trình niêm yết", "Báo cáo ESG", "Nộp hồ sơ", "50. IPO"];
    const emojis = ["🤖", "🐱", "🦆", "⚙️", "🤝", "📊", "🛡️", "📜", "💰", "🚀", "💡", "📡", "🛰️", "🚀", "🌌", "🌠", "🌍", "🔥", "✨", "🌟"]; // Thêm emoji để đa dạng hơn
    
    let missions = Array.from({length: 50}, (_, i) => ({ 
        id: i + 1, title: titles[i], status: false, note: "", doc: "#"
    }));
    let isAdmin = false;
    let pin = "";

    async function init() {
        await fetchFromSheets(); // Lấy dữ liệu lần đầu
        setInterval(fetchFromSheets, 4000); // Tự động cập nhật mỗi 4 giây
        render(); // Render sau khi có dữ liệu

        // HỖ TRỢ BÀN PHÍM VẬT LÝ CHO PASSCODE
        window.addEventListener('keydown', (e) => {
            if (document.getElementById('auth-overlay').style.display === 'flex') {
                if (e.key >= '0' && e.key <= '9') pressNum(e.key);
                if (e.key === 'Backspace') clearPin();
                if (e.key === 'Escape') closeAuth();
            }
        });
    }

    async function fetchFromSheets() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            if (data && data.length > 0) {
                data.forEach((item, i) => {
                    // Kiểm tra item.id có tồn tại không trước khi truy cập
                    const currentId = item.id || i + 1; 
                    const m = missions.find(x => x.id === currentId);
                    if (m) {
                        m.status = (item.status === true || item.status === "TRUE");
                        m.note = item.note || "Đang chờ cập nhật...";
                        m.doc = item.doc || "#";
                    }
                });
                document.getElementById('sync-label').innerText = "VŨ TRỤ ĐÃ KẾT NỐI";
                render(); // Render lại sau khi fetch xong
            }
        } catch (e) { 
            console.error("Lỗi kết nối hoặc đọc Sheets:", e);
            document.getElementById('sync-label').innerText = "DỰ PHÒNG ACTIVE"; 
        }
    }

    async function toggleTask(id) {
        if (!isAdmin) return;
        const m = missions.find(x => x.id === id);
        // Ngăn không cho tích task nếu task trước chưa hoàn thành
        if (id > 1 && !missions[id-2].status && !m.status) {
            alert("Vui lòng hoàn thành nhiệm vụ trước đó!");
            return;
        }
        
        const nextStatus = !m.status;
        m.status = nextStatus; // Cập nhật trạng thái ngay lập tức trên UI
        render();

        // Gửi lệnh lưu vào Google Sheets thông qua Apps Script
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Cần no-cors để bỏ qua CORS policy khi POST
                body: JSON.stringify({ id: id, status: nextStatus })
            });
        } catch (e) { console.error("Lưu Sheets thất bại:", e); }
    }

    function render() {
        const map = document.getElementById('star-map');
        if (!map) return;
        map.innerHTML = ''; 
        let done = missions.filter(m => m.status).length;
        document.getElementById('p-bar').style.width = (done/50)*100 + '%';
        
        missions.forEach((m, i) => {
            const avail = i === 0 || missions[i-1].status;
            const state = m.status ? 'completed' : (avail ? 'active' : 'locked');
            const el = document.createElement('div');
            el.className = `mission-cube ${state}`;
            el.onclick = () => toggleTask(m.id);
            
            // Render các mặt của khối lập phương
            el.innerHTML = `
                <div class="cube-face front">
                    <span class="mission-emoji">${m.status ? emojis[i % emojis.length] : ''}</span>
                    <span class="mission-title">${m.title}</span>
                </div>
                <div class="cube-face back"></div>
                <div class="cube-face right"></div>
                <div class="cube-face left"></div>
                <div class="cube-face top"></div>
                <div class="cube-face bottom"></div>
                
                <div class="mission-tooltip">
                    <p class="text-white font-bold mb-1 text-[13px]">${m.title}</p>
                    <p class="text-slate-400 mb-2 italic text-[10px]">${m.note}</p>
                    ${m.doc && m.doc !== "#" ? `<a href="${m.doc}" target="_blank" class="text-neon-blue underline text-[10px] block mt-2">Xem tài liệu đính kèm</a>` : ""}
                </div>
            `;
            map.appendChild(el);
        });
    }

    function showAuth() { document.getElementById('auth-overlay').style.display = 'flex'; clearPin(); }
    function closeAuth() { document.getElementById('auth-overlay').style.display = 'none'; }
    function clearPin() { pin = ""; updateDots(); }
    function pressNum(n) {
        if (pin.length < 4) {
            pin += n;
            updateDots();
            if (pin === "1909") {
                isAdmin = true;
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('auth-btn').innerText = "CHỈ HUY ACTIVE";
                render();
            } else if (pin.length === 4) setTimeout(clearPin, 300);
        }
    }
    function updateDots() {
        const ds = document.getElementById('auth-dots').children;
        for(let i=0; i<4; i++) ds[i].style.background = pin.length > i ? '#31ada1' : 'transparent';
    }
    init();
</script>
</body>
</html>

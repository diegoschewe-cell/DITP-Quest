<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DITP | GALAXY COMMAND v13.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --ditp-green: #31ada1; --ditp-orange: #f37d26; --bg: #020617; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .nebula { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a192f 0%, #020617 100%); }
        
        /* Orb & Mascot Styling */
        .orb { width: 70px; height: 70px; position: absolute; cursor: pointer; transition: 0.5s; z-index: 10; }
        .orb-core { position: absolute; inset: 0; border-radius: 50%; border: 2px solid rgba(49, 173, 161, 0.3); background: radial-gradient(circle, rgba(49, 173, 161, 0.2) 0%, transparent 70%); animation: breathe 4s infinite; }
        .completed .orb-core { border-color: var(--ditp-green); box-shadow: 0 0 30px var(--ditp-green); background: rgba(49, 173, 161, 0.1); }
        .active .orb-core { border-color: var(--ditp-orange); box-shadow: 0 0 15px var(--ditp-orange); }
        
        .mascot { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; animation: float 3s infinite ease-in-out; pointer-events: none; }
        
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Neural Path */
        .neural-svg { position: absolute; inset: 0; width: 100%; height: 8000px; pointer-events: none; z-index: 1; }
        .flow-line { fill: none; stroke: var(--ditp-green); stroke-width: 1; stroke-dasharray: 5, 15; animation: flow 20s linear infinite; opacity: 0.2; }
        @keyframes flow { to { stroke-dashoffset: -300; } }

        /* HUD */
        .hud { background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(49, 173, 161, 0.2); }
    </style>
</head>
<body>

<div class="nebula"></div>
<svg class="neural-svg" id="neural-net"></svg>

<div class="relative z-10">
    <header class="hud sticky top-0 p-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-4">
            <img src="Logo-chia-se-trach-nhiem.png" class="w-12 h-12 object-contain" onerror="this.src='https://via.placeholder.com/48'">
            <div>
                <h1 class="text-sm font-black tracking-widest uppercase">DITP Galaxy Command Hub</h1>
                <div class="flex items-center gap-2 mt-1 text-[10px]">
                    <div class="w-24 h-1 bg-white/5 rounded-full overflow-hidden"><div id="p-bar" class="h-full bg-[#31ada1]" style="width: 0%"></div></div>
                    <span id="p-text" class="text-[#31ada1] font-bold">0%</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span id="status-icon" class="text-[8px] text-slate-500 font-bold uppercase">Cloud: Online</span>
            <button onclick="showAuth()" id="auth-btn" class="text-[9px] border border-[#31ada1]/30 px-4 py-1.5 rounded-full text-[#31ada1] hover:bg-[#31ada1]/10">[ QUẢN TRỊ ]</button>
        </div>
    </header>

    <main id="star-map" class="relative w-full min-h-[8000px] pt-20 px-10"></main>
</div>

<div id="auth-overlay" style="display:none;" class="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center backdrop-blur-3xl text-center">
    <div>
        <div class="flex gap-4 justify-center mb-8" id="dots">
            <div class="w-3 h-3 rounded-full border border-[#31ada1]"></div><div class="w-3 h-3 rounded-full border border-[#31ada1]"></div><div class="w-3 h-3 rounded-full border border-[#31ada1]"></div><div class="w-3 h-3 rounded-full border border-[#31ada1]"></div>
        </div>
        <p class="text-[#31ada1] text-xs font-bold tracking-[0.5em] animate-pulse uppercase">Nhập mã 1909</p>
    </div>
</div>

<script>
    const DB_URL = 'https://txveokzzwizpgqcaacur.supabase.co';
    const DB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4dmVva3p6d2l6cGdxY2FhY3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTkyNDIsImV4cCI6MjA4Nzg3NTI0Mn0.vhXbEasuPR5IyCfck9yPFpsMrcBwAxC36AuxF6GCl0w';
    const supabase = supabaseJs.createClient(DB_URL, DB_KEY);

    const titles = ["Chốt cổ đông", "Xác lập IP", "Tuyển Core 5", "Pháp nhân DITP", "MOU HTC", "Bản quyền 9.0", "VP R&D", "Hồ sơ Liên minh", "Ngân sách 12T", "Demo v1.0", "Pre-FS v1.6", "Tờ trình đầu tư", "Điều khoản ưu tiên", "Báo cáo C06", "Sandbox Scoring", "Dữ liệu sạch", "Ủng hộ Bộ", "Bảo mật C4", "Dashboard", "Phê duyệt", "Rà soát 15 Bộ", "Hợp nhất HC", "Hạ tầng DC", "VNeID thử", "API Dân cư", "An ninh mạng", "App Cán bộ", "Chạy điểm", "AI Tuning", "Nghiệm thu GĐ1", "Startup ngành", "Góp vốn IP", "BCC RAR", "Thuật toán TM", "Phí API", "MOU Ngân hàng", "Voucher An sinh", "VNeID Truyền thông", "Gọi vốn Startup", "1M Giao dịch", "Dòng tiền API", "Kiểm toán quốc tế", "Nâng cấp AI", "Phủ 15 nhóm", "Hội thảo Data", "Thoái vốn", "Lộ trình niêm yết", "Báo cáo ESG", "Nộp hồ sơ", "IPO"];
    
    // Icon Mascot (Dùng emoji hoặc link ảnh linh vật anh gửi)
    const mascots = ["🤖", "🐱", "🦆", "⚙️", "🤝", "📊", "🛡️", "📜", "💰", "🚀"];

    let missions = Array.from({length: 50}, (_, i) => ({
        id: i + 1,
        title: titles[i],
        status: false,
        x: (i % 2 === 0 ? 15 : 70) + Math.sin(i) * 10,
        y: i * 160 + 100
    }));

    let isCommander = false;
    let pin = "";

    async function syncData() {
        try {
            const { data, error } = await supabase.from('missions').select('*');
            if (data) data.forEach(row => {
                const m = missions.find(x => x.id === row.id);
                if (m) m.status = row.status;
            });
            render();
        } catch (e) { console.error(e); render(); }
    }

    async function toggleTask(id) {
        if (!isCommander) return;
        const m = missions.find(x => x.id === id);
        if (id > 1 && !missions[id-2].status && !m.status) return;
        m.status = !m.status;
        await supabase.from('missions').upsert({ id: id, status: m.status });
        render();
    }

    supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'missions' }, () => syncData()).subscribe();

    function showAuth() { document.getElementById('auth-overlay').style.display = 'flex'; }
    window.addEventListener('keydown', (e) => {
        if (document.getElementById('auth-overlay').style.display === 'flex') {
            if (e.key >= '0' && e.key <= '9') {
                pin += e.key;
                const dots = document.getElementById('auth-dots').children;
                for(let i=0; i<4; i++) dots[i].style.background = pin.length > i ? '#31ada1' : 'transparent';
                if (pin === "1909") {
                    isCommander = true;
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('auth-btn').innerText = "COMMANDER ACTIVE";
                    render();
                } else if (pin.length >= 4) { pin = ""; }
            }
        }
    });

    function render() {
        const map = document.getElementById('star-map');
        const svg = document.getElementById('neural-net');
        map.innerHTML = ''; svg.innerHTML = '';

        let done = missions.filter(m => m.status).length;
        document.getElementById('p-text').innerText = Math.round((done/50)*100) + '%';
        document.getElementById('p-bar').style.width = (done/50)*100 + '%';

        missions.forEach((m, i) => {
            const avail = i === 0 || missions[i-1].status;
            const state = m.status ? 'completed' : (avail ? 'active' : 'locked');
            
            const el = document.createElement('div');
            el.className = `orb ${state}`;
            el.style.left = m.x + '%'; el.style.top = m.y + 'px';
            el.onclick = () => toggleTask(m.id);
            el.innerHTML = `
                ${m.status ? `<div class="mascot">${mascots[i % mascots.length]}</div>` : ''}
                <div class="orb-core"></div>
                <div class="absolute -right-36 top-5 w-32 text-[9px] font-bold text-slate-500 uppercase tracking-widest leading-tight">${m.title}</div>
            `;
            map.appendChild(el);

            if (i > 0) {
                const prev = missions[i-1];
                const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const d = `M ${prev.x+3}% ${prev.y+35} Q ${(prev.x+m.x)/2}% ${(prev.y+m.y)/2} ${m.x+3}% ${m.y+35}`;
                line.setAttribute("d", d);
                line.setAttribute("class", "flow-line");
                if (prev.status) line.style.opacity = "0.7";
                svg.appendChild(line);
            }
        });
    }

    syncData();
</script>
</body>
</html>

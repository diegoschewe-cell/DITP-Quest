<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DITP | GALAXY ROADMAP COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #31ada1; --bg: #010409; --active: #00f2ff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Hiệu ứng Galaxy Stars */
        #star-canvas { position: fixed; inset: 0; z-index: -1; }
        
        /* Roadmap Layout */
        #mission-grid { position: relative; z-index: 10; display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; padding: 40px 20px 150px 20px; }
        
        .node-card { 
            background: rgba(1, 4, 9, 0.85); border: 2px solid rgba(255,255,255,0.1); 
            border-radius: 12px; padding: 16px; width: 230px; min-height: 170px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; backdrop-filter: blur(8px);
        }
        .completed { border-color: var(--neon); box-shadow: 0 0 25px rgba(49, 173, 161, 0.4); }
        .active { border-color: var(--active); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); border-style: dashed; }
        .locked { opacity: 0.25; filter: grayscale(1); cursor: not-allowed; }

        /* Neon Roadmap Connectors */
        .node-card::after {
            content: ''; position: absolute; top: 50%; right: -42px;
            width: 42px; height: 2px; background: rgba(255, 255, 255, 0.05); z-index: -1;
        }
        .completed::after { background: var(--neon); box-shadow: 0 0 12px var(--neon); }
        .node-card:nth-child(5n)::after { display: none; }

        /* Modal Styling */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(10px); }
        .modal-box { background: #0a192f; border: 1px solid var(--active); padding: 30px; border-radius: 15px; width: 450px; box-shadow: 0 0 40px rgba(0, 242, 255, 0.2); }
        input, textarea { background: rgba(0,0,0,0.4); border: 1px solid #333; color: white; width: 100%; padding: 10px; border-radius: 6px; margin-top: 6px; font-size: 13px; border: 1px solid rgba(0, 242, 255, 0.2); }
        input:focus, textarea:focus { border-color: var(--active); outline: none; box-shadow: 0 0 5px var(--active); }
        
        .btn-neon { background: var(--neon); color: black; font-weight: 900; border-radius: 6px; padding: 12px; width: 100%; margin-top: 20px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-neon:hover { box-shadow: 0 0 20px var(--neon); transform: scale(1.02); }

        .link-pill { font-size: 8px; border: 1px solid var(--neon); padding: 2px 6px; border-radius: 4px; color: var(--neon); transition: 0.3s; }
        .link-pill:hover { background: var(--neon); color: black; }
    </style>
</head>
<body class="p-4 overflow-y-auto">
    <canvas id="star-canvas"></canvas>

    <header class="hud-panel p-6 mb-12 flex justify-between items-center sticky top-0 z-50 border border-white/10 bg-black/70 backdrop-blur-xl rounded-2xl">
        <div class="flex items-center gap-4">
            <img src="logo-ditp.png" class="w-12 h-12 object-contain" onerror="this.src='https://via.placeholder.com/48'">
            <div>
                <h1 class="orbitron text-2xl font-black text-white tracking-widest">GALAXY ROADMAP</h1>
                <p id="status-label" class="text-[9px] text-cyan-400 orbitron tracking-widest">SYSTEM VERSION 25.0 - ONLINE</p>
            </div>
        </div>
        <div class="text-right">
            <p id="integrity-val" class="orbitron text-4xl font-black text-emerald-400">0%</p>
            <button onclick="showAuth()" id="auth-btn" class="text-[10px] orbitron border border-cyan-500 px-5 py-2 rounded-full text-cyan-500 hover:bg-cyan-500 hover:text-black transition-all">COMMANDER ACCESS</button>
        </div>
    </header>

    <div id="mission-grid"></div>

    <div id="edit-modal" class="modal">
        <div class="modal-box">
            <h2 class="orbitron text-cyan-400 mb-6 border-b border-cyan-900 pb-3 text-lg font-bold">NODE CONFIGURATION</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-400 font-bold uppercase">Tên nhiệm vụ (Editable)</label>
                    <input id="m-title" type="text" spellcheck="false">
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 font-bold uppercase">Ghi chú (Text Note)</label>
                    <textarea id="m-note" rows="3" spellcheck="false" placeholder="Nhập báo cáo tiến độ..."></textarea>
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 font-bold uppercase">Nhiều link DOC (Cách nhau bằng dấu phẩy)</label>
                    <input id="m-doc" type="text" placeholder="https://link1.com, https://link2.com">
                </div>
            </div>
            <button onclick="saveChanges()" class="btn-neon orbitron">Sync to Galaxy Sheet</button>
            <button onclick="closeModal()" class="w-full text-gray-500 text-[10px] mt-4 uppercase tracking-widest">Discard Changes</button>
        </div>
    </div>

<script>
    const API_URL = "https://api.sheetbest.com/sheets/d418f240-85d9-4280-a1b2-3318dc6ba411";
    let missions = []; let isAdmin = false; let currentIdx = null; let isSyncing = false;

    // --- ENGINE: GALAXY STARFIELD ---
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = Array.from({length: 250}, () => ({ 
            x: Math.random()*canvas.width, 
            y: Math.random()*canvas.height, 
            size: Math.random()*1.8, 
            speed: Math.random()*0.4 + 0.1 
        }));
    }
    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            s.y += s.speed; if(s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(drawStars);
    }
    window.addEventListener('resize', initStars); initStars(); drawStars();

    // --- DATA HANDLING ---
    async function fetchData() {
        if (isSyncing) return;
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            missions = data.map((item, i) => ({
                id: i + 1,
                title: item.title || item.C || "Unknown Node",
                status: (item.status === "TRUE" || item.B === "TRUE" || item.status === true),
                note: item.note || item.D || "",
                doc: item.doc || item.E || ""
            }));
            render();
        } catch (e) { console.error("Sync error"); }
    }

    function render() {
        const grid = document.getElementById('mission-grid');
        grid.innerHTML = '';
        let done = missions.filter(m => m.status).length;
        document.getElementById('integrity-val').innerText = Math.round((done/missions.length)*100) + '%';

        missions.forEach((m, i) => {
            if (i === 0) grid.innerHTML += `<div class="w-full section-divider orbitron text-center py-4 opacity-50 tracking-[1em]">--- GENESIS STATION ---</div>`;
            if (i === 10) grid.innerHTML += `<div class="w-full section-divider orbitron text-center py-4 opacity-50 tracking-[1em]">--- TACTICAL STATION ---</div>`;
            
            const avail = i === 0 || missions[i-1].status;
            const state = m.status ? 'completed' : (avail ? 'active' : 'locked');
            const card = document.createElement('div');
            card.className = `node-card ${state}`;
            
            const links = m.doc ? m.doc.split(',').filter(l => l.trim().startsWith('http')) : [];
            let linkHtml = links.map((l, idx) => `<a href="${l.trim()}" target="_blank" onclick="event.stopPropagation()" class="link-pill">FILE ${idx+1}</a>`).join(' ');

            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <span class="text-[10px] orbitron font-black text-gray-500 tracking-tighter">NODE ${String(m.id).padStart(2,'0')}</span>
                    <button onclick="openModal(event, ${i})" class="text-[12px] text-gray-500 hover:text-white transition-colors">✎</button>
                </div>
                <h3 class="text-[12px] orbitron font-bold uppercase leading-tight h-10 overflow-hidden text-white/90">${m.title}</h3>
                <p class="text-[9px] text-emerald-400 italic mt-3 min-h-[40px] leading-relaxed border-l border-emerald-900/50 pl-2">${m.note || 'Awaiting intel...'}</p>
                <div class="flex flex-wrap gap-2 mt-4">${linkHtml}</div>
                ${m.status ? '<div class="absolute -top-3 -right-3 bg-emerald-500 text-black text-[9px] font-black px-3 py-1 rounded-full shadow-[0_0_15px_#10b981]">MISSION COMPLETE</div>' : ''}
            `;
            card.onclick = () => toggleStatus(i);
            grid.appendChild(card);
        });
    }

    async function toggleStatus(idx) {
        if(!isAdmin) { showAuth(); return; }
        const m = missions[idx];
        
        // KIỂM ĐỊNH TRƯỚC KHI CHỐT
        if(!m.status && (!m.note || m.note.length < 5 || !m.doc)) {
            alert("SECURITY ALERT: Không thể chốt Node nếu chưa có Ghi chú báo cáo và Link tài liệu đính kèm!"); return;
        }
        if(idx > 0 && !missions[idx-1].status && !m.status) return;

        isSyncing = true;
        m.status = !m.status;
        render();
        await fetch(`${API_URL}/${idx}`, { 
            method: "PATCH", 
            headers: {"Content-Type":"application/json"}, 
            body: JSON.stringify({status: m.status ? "TRUE" : "FALSE"}) 
        });
        setTimeout(() => isSyncing = false, 2500);
    }

    function openModal(e, idx) {
        e.stopPropagation(); if(!isAdmin) { showAuth(); return; }
        currentIdx = idx;
        document.getElementById('m-title').value = missions[idx].title;
        document.getElementById('m-note').value = missions[idx].note;
        document.getElementById('m-doc').value = missions[idx].doc;
        document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

    async function saveChanges() {
        isSyncing = true;
        const upData = {
            title: document.getElementById('m-title').value,
            note: document.getElementById('m-note').value,
            doc: document.getElementById('m-doc').value
        };
        Object.assign(missions[currentIdx], upData);
        render(); closeModal();
        
        await fetch(`${API_URL}/${currentIdx}`, { 
            method: "PATCH", 
            headers: {"Content-Type":"application/json"}, 
            body: JSON.stringify(upData) 
        });
        setTimeout(() => { isSyncing = false; fetchData(); }, 2500);
    }

    // AUTH logic (Passcode 1909)
    let pin = "";
    function pressNum(n) { 
        pin += n; 
        if(pin === "1909") { 
            isAdmin = true; closeAuth(); 
            document.getElementById('auth-btn').innerText = "COMMANDER ACTIVE"; 
            document.getElementById('auth-btn').className = "text-[10px] orbitron bg-emerald-600 border border-emerald-400 px-5 py-2 rounded-full text-white shadow-[0_0_20px_#10b981]";
            render(); 
        } 
        if(pin.length >= 4) pin = ""; 
    }
    function showAuth() { document.getElementById('auth-overlay').style.display = 'flex'; pin = ""; }
    function closeAuth() { document.getElementById('auth-overlay').style.display = 'none'; }
    window.addEventListener('keydown', (e) => { if(!isAdmin && e.key >= '0' && e.key <= '9') pressNum(e.key); });

    fetchData(); setInterval(fetchData, 12000);
</script>

<div id="auth-overlay" class="modal"><div class="modal-box text-center"><p class="orbitron text-cyan-400 mb-4 tracking-widest font-black">SECURITY CHALLENGE</p><p class="text-gray-500 text-[10px]">Nhập Passcode Commander từ bàn phím</p></div></div>
</body>
</html>

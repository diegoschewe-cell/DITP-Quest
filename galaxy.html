<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DITP | GALAXY COMMAND OS v26.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #31ada1; --bg: #010409; --active: #00f2ff; --gold: #ffcc00; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        #star-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        #mission-grid { 
            position: relative; z-index: 10; display: flex; flex-wrap: wrap; 
            gap: 50px; justify-content: center; padding: 50px 20px 200px 20px; 
        }
        .node-card { 
            background: rgba(1, 4, 9, 0.85); border: 2px solid rgba(255,255,255,0.1); 
            border-radius: 15px; padding: 18px; width: 240px; min-height: 200px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; 
            position: relative; backdrop-filter: blur(10px);
        }
        .completed { border-color: var(--neon); box-shadow: 0 0 30px rgba(49, 173, 161, 0.4); }
        
        .active { 
            border-color: var(--active); 
            box-shadow: 0 0 30px var(--active), inset 0 0 15px var(--active);
            animation: galaxyPulse 1.5s infinite;
            border-width: 3px;
        }
        @keyframes galaxyPulse {
            0% { transform: scale(1); box-shadow: 0 0 20px var(--active); }
            50% { transform: scale(1.02); box-shadow: 0 0 40px var(--active); }
            100% { transform: scale(1); box-shadow: 0 0 20px var(--active); }
        }

        .node-card::after {
            content: ''; position: absolute; top: 50%; right: -52px;
            width: 50px; height: 2px; background: rgba(255, 255, 255, 0.05); z-index: -1;
        }
        .completed::after { background: var(--neon); box-shadow: 0 0 15px var(--neon); }
        .node-card:nth-child(5n)::after { display: none; }

        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; align-items:center; justify-content:center; backdrop-filter: blur(15px); }
        .modal-box { background: #0a192f; border: 1px solid var(--active); padding: 30px; border-radius: 20px; width: 480px; box-shadow: 0 0 50px rgba(0, 242, 255, 0.3); }
        input, textarea { background: rgba(0,0,0,0.5); border: 1px solid #333; color: white; width: 100%; padding: 12px; border-radius: 8px; margin-top: 8px; font-size: 13px; border: 1px solid rgba(0, 242, 255, 0.2); }
        .btn-neon { background: var(--neon); color: black; font-weight: 900; border-radius: 8px; padding: 14px; width: 100%; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-neon:hover { box-shadow: 0 0 25px var(--neon); transform: scale(1.03); }
        
        .ts-tag { font-size: 9px; color: var(--neon); font-family: 'Orbitron'; margin-top: 10px; display: block; opacity: 0.8; }
        .link-pill { font-size: 8px; border: 1px solid var(--neon); padding: 3px 8px; border-radius: 5px; color: var(--neon); margin-right: 5px; margin-top: 5px; display: inline-block; transition: 0.3s; }
    </style>
</head>
<body>
    <canvas id="star-canvas"></canvas>

    <header class="p-6 mb-10 flex justify-between items-center sticky top-0 z-50 border-b border-white/10 bg-black/80 backdrop-blur-2xl">
        <div class="flex items-center gap-5">
            <img src="logo-ditp.png" class="w-14 h-14 object-contain" onerror="this.src='https://via.placeholder.com/64'">
            <div>
                <h1 class="orbitron text-2xl font-black text-white tracking-[0.2em]">GALAXY COMMAND</h1>
                <p id="system-msg" class="text-[10px] text-cyan-400 orbitron animate-pulse">SYSTEM VERSION 26.2 // AUDIT LOG: ON</p>
            </div>
        </div>
        <div class="text-right flex items-center gap-8">
            <div class="hidden md:block">
                <p class="text-[8px] text-gray-500 orbitron text-right mb-1 uppercase">Project Integrity</p>
                <div class="w-48 bg-gray-800 h-2 rounded-full overflow-hidden border border-gray-700">
                    <div id="p-bar" class="h-full bg-gradient-to-r from-cyan-600 to-emerald-400 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
            <div>
                <p id="integrity-val" class="orbitron text-4xl font-black text-emerald-400">0%</p>
                <button onclick="showAuth()" id="auth-btn" class="text-[9px] orbitron border border-cyan-500 px-5 py-2 rounded-full text-cyan-500 hover:bg-cyan-500 hover:text-black transition-all">COMMANDER LOGIN</button>
            </div>
        </div>
    </header>

    <div id="mission-grid"></div>

    <div id="edit-modal" class="modal">
        <div class="modal-box">
            <h2 class="orbitron text-cyan-400 mb-6 border-b border-cyan-900 pb-3 text-lg font-bold">NODE CONFIGURATION</h2>
            <div class="space-y-4">
                <div><label class="text-[10px] text-gray-400 font-bold uppercase">Tên Nhiệm Vụ</label><input id="m-title" type="text" spellcheck="false"></div>
                <div><label class="text-[10px] text-gray-400 font-bold uppercase">Ghi Chú Báo Cáo (Text)</label><textarea id="m-note" rows="3" spellcheck="false"></textarea></div>
                <div><label class="text-[10px] text-gray-400 font-bold uppercase">Links Tài Liệu (Cách nhau dấu phẩy)</label><input id="m-doc" type="text" placeholder="https://link1.com, https://link2.com"></div>
            </div>
            <button onclick="markNodeComplete()" class="w-full bg-emerald-500 text-black font-black orbitron text-[10px] py-4 rounded-lg mt-4 mb-2 shadow-[0_0_15px_#10b981] hover:scale-105 transition">MARK AS MISSION COMPLETE</button>
            <button onclick="saveNodeData()" class="btn-neon orbitron text-[10px]">Sync to Galaxy Sheet</button>
            <button onclick="closeModal('edit-modal')" class="w-full text-gray-500 text-[10px] mt-4 uppercase orbitron">Discard</button>
        </div>
    </div>

    <div id="timeline-modal" class="modal">
        <div class="modal-box border-yellow-500">
            <h2 class="orbitron text-yellow-500 mb-4 font-bold text-center text-lg">TIMELINE ALERT</h2>
            <p class="text-xs text-gray-300 mb-6 text-center italic leading-relaxed">Bạn đang thay đổi một mốc thời gian đã được xác lập. Hành động này sẽ được ghi lại trong nhật ký hệ thống.</p>
            <div class="flex gap-4">
                <button onclick="commitToggle()" class="flex-1 bg-yellow-600 text-black font-black p-4 rounded-xl text-[10px] orbitron">CONFIRM UPDATE</button>
                <button onclick="closeModal('timeline-modal')" class="flex-1 border border-gray-600 p-4 rounded-xl text-[10px] orbitron text-gray-400">CANCEL</button>
            </div>
        </div>
    </div>

<script>
    const API_URL = "https://api.sheetbest.com/sheets/d418f240-85d9-4280-a1b2-3318dc6ba411";
    let missions = []; let isAdmin = false; let currentIdx = null; let isSyncing = false;

    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = Array.from({length: 300}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.6, speed: Math.random()*0.3 + 0.1 }));
    }
    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            s.y += s.speed; if(s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(drawStars);
    }
    window.addEventListener('resize', initStars); initStars(); drawStars();

    async function fetchData() {
        if (isSyncing) return;
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            missions = data.map((item, i) => ({
                id: i + 1,
                title: item.title || item.C || "Unknown Task",
                status: (item.status === "TRUE" || item.B === "TRUE"),
                note: item.note || item.D || "",
                doc: item.doc || item.E || "",
                ts: item.timestamp || item.F || ""
            }));
            render();
            document.getElementById('system-msg').innerText = "VŨ TRỤ ĐÃ KẾT NỐI // REAL-TIME SYNC ON";
        } catch (e) { document.getElementById('system-msg').innerText = "MẤT KẾT NỐI // RECONNECTING..."; }
    }

    function render() {
        const grid = document.getElementById('mission-grid');
        grid.innerHTML = '';
        let done = missions.filter(m => m.status).length;
        let p = Math.round((done/missions.length)*100);
        document.getElementById('integrity-val').innerText = p + '%';
        document.getElementById('p-bar').style.width = p + '%';

        missions.forEach((m, i) => {
            if (i === 0) grid.innerHTML += `<div class="w-full orbitron text-center py-6 text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)] tracking-[1.5em] text-[12px] font-bold">--- STATION 01: GENESIS ---</div>`;
            if (i === 10) grid.innerHTML += `<div class="w-full orbitron text-center py-6 text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)] tracking-[1.5em] text-[12px] font-bold">--- STATION 02: TACTICS ---</div>`;
            
            const avail = i === 0 || missions[i-1].status;
            const state = m.status ? 'completed' : (avail ? 'active' : 'locked');
            const card = document.createElement('div');
            card.className = `node-card ${state}`;
            
            const links = m.doc ? m.doc.split(',').filter(l => l.trim().startsWith('http')) : [];
            let linkHtml = links.map((l, idx) => `<a href="${l.trim()}" target="_blank" onclick="event.stopPropagation()" class="link-pill">FILE ${idx+1}</a>`).join('');

            card.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <span class="text-[10px] orbitron font-black text-gray-500">NODE ${String(m.id).padStart(2,'0')}</span>
                    <button onclick="openEditModal(event, ${i})" class="text-[12px] text-gray-400 hover:text-white transition-colors">✎</button>
                </div>
                <h3 class="text-[12px] orbitron font-bold uppercase leading-tight h-10 overflow-hidden text-white/90">${m.title}</h3>
                <p class="text-[9px] text-emerald-400 italic mt-4 min-h-[45px] leading-relaxed border-l-2 border-emerald-900/50 pl-3">${m.note || 'Intel pending...'}</p>
                <div class="flex flex-wrap gap-1 mt-4">${linkHtml}</div>
                ${m.ts ? `<span class="ts-tag">LOGGED: ${m.ts}</span>` : ''}
                ${m.status ? '<div class="absolute -top-3 -right-3 bg-emerald-500 text-black text-[9px] font-black px-4 py-1 rounded-full shadow-[0_0_20px_#10b981]">MISSION COMPLETE</div>' : ''}
            `;
            card.onclick = () => handleNodeAction(i);
            grid.appendChild(card);
        });
    }

    function handleNodeAction(idx) {
        if(!isAdmin) { showAuth(); return; }
        const m = missions[idx];
        if(!m.status && (!m.note || m.note.length < 5 || !m.doc)) {
            alert("SECURITY ALERT: Nhập Ghi chú và Link tài liệu trước!"); return;
        }
        currentIdx = idx;
        if(m.status) { document.getElementById('timeline-modal').style.display = 'flex'; } else { commitToggle(); }
    }

    async function commitToggle() {
        isSyncing = true; closeModal('timeline-modal');
        const m = missions[currentIdx];
        m.status = !m.status;
        const now = new Date();
        const ts = m.status ? `${now.getDate()}/${now.getMonth()+1} ${now.getHours()}:${now.getMinutes()}` : "";
        m.ts = ts;
        render();
        await fetch(`${API_URL}/${currentIdx}`, { 
            method: "PATCH", headers: {"Content-Type":"application/json"}, 
            body: JSON.stringify({status: m.status ? "TRUE" : "FALSE", timestamp: ts}) 
        });
        setTimeout(() => { isSyncing = false; fetchData(); }, 2500);
    }

    function openEditModal(e, idx) {
        e.stopPropagation(); if(!isAdmin) { showAuth(); return; }
        currentIdx = idx;
        document.getElementById('m-title').value = missions[idx].title;
        document.getElementById('m-note').value = missions[idx].note;
        document.getElementById('m-doc').value = missions[idx].doc;
        document.getElementById('edit-modal').style.display = 'flex';
    }

    async function saveNodeData() {
        if (currentIdx === null) return;
        isSyncing = true;
        const m = missions[currentIdx];
        const upData = {
            "title": document.getElementById('m-title').value,
            "note": document.getElementById('m-note').value,
            "doc": document.getElementById('m-doc').value,
            "status": m.status ? "TRUE" : "FALSE",
            "timestamp": m.ts || ""
        };
        Object.assign(m, { title: upData.title, note: upData.note, doc: upData.doc });
        render(); closeModal('edit-modal');
        try {
            await fetch(`${API_URL}/${currentIdx}`, { 
                method: "PATCH", headers: {"Content-Type":"application/json"}, 
                body: JSON.stringify(upData) 
            });
        } catch (e) { console.error(e); }
        setTimeout(() => { isSyncing = false; fetchData(); }, 2500);
    }

    async function markNodeComplete() {
        if (currentIdx === null) return;
        const m = missions[currentIdx];
        const noteInput = document.getElementById('m-note').value;
        const docInput = document.getElementById('m-doc').value;
        if(!noteInput || noteInput.length < 2 || !docInput) {
            alert("SECURITY: Nhập đủ Ghi chú báo cáo và Link trước khi chốt!");
            return;
        }
        m.status = true;
        const now = new Date();
        m.ts = `${now.getDate()}/${now.getMonth()+1} ${now.getHours()}:${now.getMinutes()}`;
        await saveNodeData();
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function showAuth() { document.getElementById('auth-overlay').style.display = 'flex'; pin = ""; }
    function closeAuth() { document.getElementById('auth-overlay').style.display = 'none'; }
    
    let pin = "";
    function pressNum(n) { 
        pin += n; 
        if(pin === "1909") { 
            isAdmin = true; closeAuth(); 
            document.getElementById('auth-btn').innerText = "COMMANDER ACTIVE"; 
            document.getElementById('auth-btn').className = "text-[9px] orbitron bg-emerald-600 border border-emerald-400 px-6 py-2 rounded-full text-white shadow-[0_0_20px_#10b981]";
            render(); 
        } 
        if(pin.length >= 4) pin = ""; 
    }
    window.addEventListener('keydown', (e) => { if(!isAdmin && e.key >= '0' && e.key <= '9') pressNum(e.key); });

    fetchData(); setInterval(fetchData, 15000);
</script>

<div id="auth-overlay" class="modal"><div class="modal-box text-center"><p class="orbitron text-cyan-400 mb-4 tracking-[0.5em] font-black">SECURITY CHALLENGE</p><p class="text-gray-500 text-[10px]">ENTER COMMANDER PASSCODE FROM KEYBOARD</p></div></div>
</body>
</html>

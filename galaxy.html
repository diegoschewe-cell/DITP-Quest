<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DITP | GALAXY ROADMAP COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #31ada1; --bg: #010409; --active: #00f2ff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Hiệu ứng Galaxy Stars */
        #star-canvas { position: fixed; inset: 0; z-index: -1; }
        
        /* Roadmap Line Connectors */
        #mission-grid { position: relative; z-index: 10; display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; padding-bottom: 100px; }
        
        .node-card { 
            background: rgba(1, 4, 9, 0.8); border: 2px solid rgba(255,255,255,0.1); 
            border-radius: 15px; padding: 16px; width: 220px; min-height: 160px;
            transition: 0.4s; cursor: pointer; position: relative; backdrop-filter: blur(5px);
        }
        .completed { border-color: var(--neon); box-shadow: 0 0 20px rgba(49, 173, 161, 0.4); }
        .active { border-color: var(--active); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .locked { opacity: 0.3; filter: grayscale(1); }

        /* Neon Link Line */
        .node-card::after {
            content: ''; position: absolute; top: 50%; right: -42px;
            width: 40px; height: 2px; background: rgba(49, 173, 161, 0.2); z-index: -1;
        }
        .completed::after { background: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .node-card:nth-child(5n)::after { display: none; }

        /* Modal & Inputs */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; }
        .modal-box { background: #0a192f; border: 1px solid var(--active); padding: 25px; border-radius: 15px; width: 400px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); }
        input, textarea { background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; width: 100%; padding: 8px; border-radius: 5px; margin-top: 5px; font-size: 13px; }
        input:focus { border-color: var(--active); outline: none; }
        
        .btn-neon { background: var(--neon); color: black; font-weight: bold; border-radius: 5px; padding: 10px; width: 100%; margin-top: 15px; transition: 0.3s; }
        .btn-neon:hover { box-shadow: 0 0 15px var(--neon); }
    </style>
</head>
<body class="p-4 overflow-y-auto h-screen">
    <canvas id="star-canvas"></canvas>

    <header class="hud-panel p-6 mb-12 flex justify-between items-center sticky top-0 z-50 rounded-xl border border-white/10 bg-black/60 backdrop-blur-md">
        <div>
            <h1 class="orbitron text-2xl font-black text-white tracking-tighter">DITP GALAXY ROADMAP</h1>
            <p id="status-label" class="text-[10px] text-cyan-400 orbitron">ENGINE ONLINE</p>
        </div>
        <div class="text-right">
            <p id="integrity-val" class="orbitron text-3xl font-bold text-emerald-400">0%</p>
            <button onclick="showAuth()" id="auth-btn" class="text-[10px] orbitron border border-cyan-500 px-4 py-2 rounded text-cyan-500 hover:bg-cyan-500 hover:text-black transition">COMMANDER LOGIN</button>
        </div>
    </header>

    <div id="mission-grid"></div>

    <div id="edit-modal" class="modal">
        <div class="modal-box">
            <h2 class="orbitron text-cyan-400 mb-4 border-b border-cyan-900 pb-2">NODE CONFIGURATION</h2>
            <div class="space-y-3">
                <label class="text-[10px] text-gray-400">TÊN NHIỆM VỤ</label>
                <input id="m-title" type="text">
                <label class="text-[10px] text-gray-400">GHI CHÚ (TEXT)</label>
                <textarea id="m-note" rows="2"></textarea>
                <label class="text-[10px] text-gray-400">DANH SÁCH LINK (CÁCH NHAU DẤU PHẨY)</label>
                <input id="m-doc" type="text" placeholder="link1, link2...">
            </div>
            <button onclick="saveChanges()" class="btn-neon orbitron text-xs mt-6">SAVE & SYNC TO GALAXY</button>
            <button onclick="closeModal()" class="w-full text-gray-500 text-[10px] mt-4 uppercase">Cancel</button>
        </div>
    </div>

<script>
    const API_URL = "https://api.sheetbest.com/sheets/d418f240-85d9-4280-a1b2-3318dc6ba411";
    let missions = []; let isAdmin = false; let currentIdx = null; let isSyncing = false;

    // --- HIỆU ỨNG GALAXY STARS ---
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = Array.from({length: 200}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.5, speed: Math.random()*0.5 }));
    }
    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            s.y += s.speed; if(s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(drawStars);
    }
    window.addEventListener('resize', initStars); initStars(); drawStars();

    // --- DỮ LIỆU ---
    async function fetchData() {
        if (isSyncing) return;
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            missions = data.map((item, i) => ({
                id: i + 1,
                title: item.title || "Unknown Task",
                status: (item.status === "TRUE" || item.status === true),
                note: item.note || "",
                doc: item.doc || ""
            }));
            render();
        } catch (e) { console.error("API error"); }
    }

    function render() {
        const grid = document.getElementById('mission-grid');
        grid.innerHTML = '';
        let done = missions.filter(m => m.status).length;
        document.getElementById('integrity-val').innerText = Math.round((done/missions.length)*100) + '%';

        missions.forEach((m, i) => {
            const avail = i === 0 || missions[i-1].status;
            const state = m.status ? 'completed' : (avail ? 'active' : 'locked');
            const card = document.createElement('div');
            card.className = `node-card ${state}`;
            
            // Render Multi-Links
            const links = m.doc ? m.doc.split(',').filter(l => l.trim() !== "") : [];
            let linkHtml = links.map((l, idx) => `<a href="${l.trim()}" target="_blank" onclick="event.stopPropagation()" class="text-[8px] border border-cyan-800 px-1 rounded hover:bg-cyan-900">DOC ${idx+1}</a>`).join(' ');

            card.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <span class="text-[9px] orbitron font-bold text-gray-500">${String(m.id).padStart(2,'0')}</span>
                    <button onclick="openModal(event, ${i})" class="text-[10px] text-gray-400 hover:text-white">✎</button>
                </div>
                <h3 class="text-[11px] orbitron font-bold uppercase leading-tight h-8 overflow-hidden">${m.title}</h3>
                <p class="text-[9px] text-emerald-400 italic mt-3 min-h-[30px] line-clamp-3">${m.note || 'No notes...'}</p>
                <div class="flex flex-wrap gap-1 mt-3">${linkHtml}</div>
                ${m.status ? '<div class="absolute -top-2 -right-2 bg-emerald-500 text-black text-[8px] font-bold px-2 rounded-full shadow-lg shadow-emerald-500/50">DONE</div>' : ''}
            `;
            card.onclick = () => toggleStatus(i);
            grid.appendChild(card);
        });
    }

    async function toggleStatus(idx) {
        if(!isAdmin) { alert("VUI LÒNG ĐĂNG NHẬP!"); return; }
        const m = missions[idx];
        if(!m.status && (!m.note || !m.doc)) {
            alert("BẮT BUỘC: Điền Note và Link trước khi hoàn thành nhiệm vụ!"); return;
        }
        if(idx > 0 && !missions[idx-1].status && !m.status) return;

        isSyncing = true;
        m.status = !m.status;
        render();
        await fetch(`${API_URL}/${idx}`, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({status: m.status ? "TRUE" : "FALSE"}) });
        setTimeout(() => isSyncing = false, 2000);
    }

    function openModal(e, idx) {
        e.stopPropagation(); if(!isAdmin) return;
        currentIdx = idx;
        document.getElementById('m-title').value = missions[idx].title;
        document.getElementById('m-note').value = missions[idx].note;
        document.getElementById('m-doc').value = missions[idx].doc;
        document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

    async function saveChanges() {
        isSyncing = true;
        const upData = {
            title: document.getElementById('m-title').value,
            note: document.getElementById('m-note').value,
            doc: document.getElementById('m-doc').value
        };
        Object.assign(missions[currentIdx], upData);
        render(); closeModal();
        await fetch(`${API_URL}/${currentIdx}`, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify(upData) });
        setTimeout(() => isSyncing = false, 2000);
    }

    // AUTH logic (Giữ nguyên Passcode 1909)
    let pin = "";
    function pressNum(n) { pin += n; if(pin === "1909") { isAdmin = true; closeAuth(); document.getElementById('auth-btn').innerText = "COMMANDER ACTIVE"; render(); } if(pin.length >= 4) pin = ""; }
    function showAuth() { document.getElementById('auth-overlay').style.display = 'flex'; pin = ""; }
    function closeAuth() { document.getElementById('auth-overlay').style.display = 'none'; }
    window.addEventListener('keydown', (e) => { if(isAdmin === false && e.key >= '0' && e.key <= '9') pressNum(e.key); });

    fetchData(); setInterval(fetchData, 10000);
</script>

<div id="auth-overlay" class="modal" onclick="closeAuth()"><div class="modal-box text-center" onclick="event.stopPropagation()"><p class="orbitron text-cyan-400 mb-4">Nhập Passcode 1909</p></div></div>
</body>
</html>
